async function hashPin(pin) {
  const buf = new TextEncoder().encode(pin + ':porra2026');
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function tendencia(gl, gv) { return gl > gv ? '1' : gl < gv ? '2' : 'X'; }

async function login(nombre, pin) {
  nombre = nombre.trim();
  if (!nombre || pin.length !== 4) throw new Error('Datos inválidos');
  const ph = await hashPin(pin);
  if (!SUPA_ON) {
    const localUid = 'local_' + nombre.toLowerCase();
    return { id: localUid, nombre };
  }
  let { data: matches } = await supa.from('usuarios').select('*').ilike('nombre', nombre);
  const existing = matches && matches.length ? matches[0] : null;
  if (existing) {
    if (existing.pin_hash !== ph) throw new Error('PIN incorrecto');
    return { id: existing.id, nombre: existing.nombre };
  }
  const { data: created, error } = await supa.from('usuarios').insert({ nombre, pin_hash: ph }).select().single();
  if (error) {
    if (error.code === '23505') throw new Error('Ese nombre ya está en uso');
    throw new Error('No se pudo crear: ' + error.message);
  }
  return { id: created.id, nombre: created.nombre };
}

async function cargarCuotas() {
  if (SUPA_ON) {
    const { data } = await supa.from('cuotas').select('*');
    if (data && data.length) {
      data.forEach(c => State.cuotas[c.match_id] = [c.cuota_1, c.cuota_x, c.cuota_2]);
      State.cuotasModificadas = data.some(c => c.fuente && c.fuente !== 'estimacion');
      LS.saveCuotas(State.cuotas);
      return;
    }
  }
  const ls = LS.loadCuotas();
  if (ls) State.cuotas = ls;
}

async function cargarResultados() {
  if (SUPA_ON) {
    const { data } = await supa.from('resultados').select('*');
    if (data) {
      State.resultados = {};
      data.forEach(r => State.resultados[r.match_id] = { gl: r.gol_local, gv: r.gol_visitante });
      LS.saveResults(State.resultados);
      return;
    }
  }
  State.resultados = LS.loadResults();
}

async function cargarPredicciones(uid) {
  if (SUPA_ON && !uid.startsWith('local_')) {
    const { data } = await supa.from('predicciones').select('*').eq('user_id', uid);
    if (data) {
      State.predicciones = {};
      data.forEach(p => State.predicciones[p.match_id] = {
        gl: p.gol_local, gv: p.gol_visitante,
        cuota: parseFloat(p.cuota_apostada), mult: parseFloat(p.multiplicador), tend: p.tendencia,
        fase: p.fase
      });
      LS.savePred(uid, State.predicciones);
      return;
    }
  }
  State.predicciones = LS.loadPred(uid);
}

async function cargarTodasPredicciones() {
  if (!SUPA_ON) { State.allUsers = []; State.allPredicciones = {}; return; }
  const { data: users } = await supa.from('usuarios').select('id, nombre');
  State.allUsers = users || [];
  const { data: preds } = await supa.from('predicciones').select('*');
  State.allPredicciones = {};
  (preds||[]).forEach(p => {
    if (!State.allPredicciones[p.user_id]) State.allPredicciones[p.user_id] = {};
    State.allPredicciones[p.user_id][p.match_id] = {
      gl: p.gol_local, gv: p.gol_visitante,
      cuota: parseFloat(p.cuota_apostada), mult: parseFloat(p.multiplicador), tend: p.tendencia,
      fase: p.fase
    };
  });
}

async function guardarPrediccion(match_id, gl, gv, fase, cuotasArr) {
  const tend = tendencia(gl, gv);
  let cuota = null, mult = null;
  if (fase === 'grupos' && cuotasArr) {
    cuota = tend === '1' ? cuotasArr[0] : tend === 'X' ? cuotasArr[1] : cuotasArr[2];
    mult = multiplicadorPorCuota(cuota);
  }
  State.predicciones[match_id] = { gl, gv, cuota, mult, tend, fase };
  LS.savePred(State.user.id, State.predicciones);
  if (SUPA_ON && !State.user.id.startsWith('local_')) {
    const { error } = await supa.from('predicciones').upsert({
      user_id: State.user.id, match_id, gol_local: gl, gol_visitante: gv,
      tendencia: tend, cuota_apostada: cuota, multiplicador: mult, fase,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,match_id' });
    if (error) throw error;
  }
}

        <p class="text-sm" style="color:var(--text-dim)">Selecciona el resultado esperado para cada partido</p>
      </div>
      <div id="matches-list"></div>
    </div>
    <div id="float-save"></div>
  `;
  const matchesList = $('#matches-list');
  PARTIDOS_GRUPOS.slice(0, 6).forEach(([mid, grupo, local, vis, fecha, jorn]) => {
    const pred = State.predicciones[mid] || {};
    const cuotas = State.cuotas[mid] || [1,1,1];
    matchesList.innerHTML += `
      <div class="card p-4">
        <div class="flex items-center justify-between mb-3">
          <div class="text-sm font-bold" style="color:var(--gold)">${grupo} · ${fecha}</div>
          <span class="pill pill-x1">Jornada ${jorn}</span>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex-1">
            <div class="text-sm">${EQUIPOS[local].flag} ${EQUIPOS[local].name}</div>
          </div>
          <div class="flex gap-2">
            <input type="number" min="0" max="9" class="input-score match-score" data-match="${mid}" data-type="gl" value="${pred.gl || ''}" placeholder="0">
            <span style="color:var(--text-dim)">-</span>
            <input type="number" min="0" max="9" class="input-score match-score" data-match="${mid}" data-type="gv" value="${pred.gv || ''}" placeholder="0">
          </div>
          <div class="flex-1 text-right">
            <div class="text-sm">${EQUIPOS[vis].name} ${EQUIPOS[vis].flag}</div>
          </div>
        </div>
      </div>
    `;
  });
  
  $$('.match-score').forEach(inp => {
    inp.addEventListener('change', async (e) => {
      const mid = e.target.dataset.match;
      const type = e.target.dataset.type;
      const pred = State.predicciones[mid] || { gl: 0, gv: 0, fase: 'grupos' };
      if (type === 'gl') pred.gl = parseInt(e.target.value) || 0;
      else pred.gv = parseInt(e.target.value) || 0;
      await guardarPrediccion(mid, pred.gl, pred.gv, 'grupos', State.cuotas[mid]);
      toast('✓ Guardado', 'ok');
    });
  });
}

function renderLeaderboard() {
  const main = $('#main');
  const { filas, masterId } = calcularLeaderboard();
  main.innerHTML = `
    <div class="card overflow-hidden">
      <div class="px-4 py-4 flex items-center justify-between" style="background: var(--bg-card-2); border-bottom:1px solid var(--border)">
        <div class="font-bold text-sm tracking-wide">🏆 CLASIFICACIÓN GENERAL</div>
        <div class="text-[11px] font-bold pill pill-x1">${filas.length} PARTICIPANTES</div>
      </div>
      ${filas.map((f, i) => {
        const isMe = f.id === State.user.id;
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`;
        return `
        <div class="border-t px-4 py-3" style="border-color:var(--border); ${isMe?'background:rgba(0,255,136,0.06)':''}">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span class="text-xl font-black">${medal}</span>
              <div>
                <div class="font-bold">${f.nombre} ${isMe?'<span class="pill pill-x12">TÚ</span>':''}</div>
                <div class="text-xs" style="color:var(--text-dim)">${f.aciertosT} aciertos</div>
              </div>
            </div>
            <div class="text-right">
              <div class="font-black text-xl" style="color:var(--grass)">${f.total}</div>
              <div class="text-xs" style="color:var(--text-dim)">Puntos</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderResumen() {
  const main = $('#main');
  main.innerHTML = `
    <div class="card p-4">
      <h2 class="font-bold text-lg mb-4" style="color:var(--grass)">Mi Bracket</h2>
      <p class="text-sm" style="color:var(--text-dim)">Los cruces se mostrarán cuando haya resultados oficiales</p>
      <div class="mt-4 p-3 rounded" style="background:rgba(0,255,136,0.1)">
        <div class="text-sm font-bold" style="color:var(--grass)">Total de predicciones: ${Object.keys(State.predicciones).length}</div>
      </div>
    </div>
  `;
}

function calcularLeaderboard() {
  const filas = State.allUsers.map(u => {
    const preds = State.allPredicciones[u.id] || {};
    let total = 0, aciertosT = 0;
    Object.entries(preds).forEach(([mid, p]) => {
      const real = State.resultados[mid];
      if (!real) return;
      const tendReal = tendencia(real.gl, real.gv);
      if (p.tend === tendReal) {
        aciertosT++;
        if (p.mult) total += PUNTOS_BASE * p.mult;
        else total += PUNTOS_BASE;
        if (p.gl === real.gl && p.gv === real.gv) total += BONUS_EXACTO;
      }
    });
    return { ...u, total, aciertosT };
  });
  filas.sort((a,b) => b.total - a.total);
  return { filas, masterId: null };
}

function renderShell() {
  $('#app').innerHTML = `
    <header class="sticky top-0 z-40 backdrop-blur" style="background:rgba(10,15,13,0.92); border-bottom:1px solid var(--border)">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <span class="text-2xl">⚽</span>
          <div>
            <div class="font-black text-sm leading-tight" style="color:var(--grass)">PORRA MUNDIAL</div>
            <div class="text-[10px] font-bold" style="color:var(--gold)">2026 · ${State.user.nombre.toUpperCase()}${State.isAdmin ? ' · ADMIN':''}</div>
          </div>
        </div>
        <button id="btn-logout" class="btn btn-ghost text-xs" style="padding:6px 12px">Salir</button>
      </div>
      <nav class="flex border-t" style="border-color:var(--border)">
        <button class="tab-btn ${State.tab==='predicciones'?'active':''}" data-tab="predicciones">⚽ Predicciones</button>
        <button class="tab-btn ${State.tab==='leaderboard'?'active':''}" data-tab="leaderboard">🏆 Clasificación</button>
        <button class="tab-btn ${State.tab==='resumen'?'active':''}" data-tab="resumen">📊 Mi Bracket</button>
      </nav>
    </header>
    <main id="main" class="px-3 py-4"></main>
  `;
  $$('.tab-btn').forEach(b => b.addEventListener('click', () => {
    State.tab = b.dataset.tab; renderShell(); renderMain();
  }));
  $('#btn-logout').addEventListener('click', () => {
    LS.clearUser(); State.user = null; State.isAdmin = false; renderLogin();
  });
  renderMain();
}

function renderMain() {
  if (State.tab === 'predicciones') renderPredicciones();
  else if (State.tab === 'leaderboard') renderLeaderboard();
  else renderResumen();
}

async function initApp() {
  await cargarCuotas();
  await cargarResultados();
  await cargarPredicciones(State.user.id);
  await cargarTodasPredicciones();
  renderShell();
}

// INIT
window.addEventListener('DOMContentLoaded', async () => {
  const savedUser = LS.loadUser();
  const savedAdmin = LS.loadAdmin();
  if (savedUser) {
    State.user = savedUser;
    State.isAdmin = savedAdmin;
    await initApp();
  } else {
    renderLogin();
  }
});
</script>
</body>
</html>
