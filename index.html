<style>
  :root {
    --bg-deep: #0a0f0d;
    --bg-card: #131c18;
    --bg-card-2: #1a2620;
    --grass: #00ff88;
    --grass-dim: #00cc6e;
    --gold: #ffc857;
    --gold-dim: #d4a437;
    --text: #e8f0ec;
    --text-dim: #8a9a93;
    --border: #243029;
    --danger: #ff5470;
    --warn: #ffb547;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg-deep); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  body { background-image: radial-gradient(ellipse at top, rgba(0,255,136,0.04) 0%, transparent 50%), radial-gradient(ellipse at bottom, rgba(255,200,87,0.03) 0%, transparent 50%); min-height: 100vh; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; }
  .card-2 { background: var(--bg-card-2); border: 1px solid var(--border); border-radius: 12px; }
  .pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; display: inline-flex; align-items: center; gap: 4px; }
  .pill-x1   { background: rgba(138,154,147,0.18); color: #b8c5be; }
  .pill-x12  { background: rgba(0,255,136,0.12);   color: var(--grass); }
  .pill-x14  { background: rgba(255,200,87,0.15);  color: var(--gold); }
  .pill-x16  { background: rgba(255,84,112,0.18);  color: var(--danger); }
  .input-score { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 10px; width: 48px; height: 48px; text-align: center; font-size: 22px; font-weight: 700; color: var(--text); transition: all .15s; }
  .input-score:focus { outline: none; border-color: var(--grass); box-shadow: 0 0 0 3px rgba(0,255,136,0.15); }
  .input-score.filled { border-color: var(--grass-dim); }
  .btn { padding: 12px 18px; border-radius: 12px; font-weight: 700; transition: all .15s; font-size: 14px; }
  .btn-primary { background: var(--grass); color: #001a0e; }
  .btn-primary:hover:not(:disabled) { background: var(--grass-dim); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-gold { background: var(--gold); color: #2a1d00; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--bg-card-2); }
  .tab-btn { flex: 1; padding: 14px 8px; font-weight: 600; font-size: 13px; color: var(--text-dim); position: relative; transition: all .2s; }
  .tab-btn.active { color: var(--grass); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: var(--grass); border-radius: 3px 3px 0 0; }
  .float-save { position: fixed; bottom: 80px; right: 18px; z-index: 50; box-shadow: 0 8px 24px rgba(0,255,136,0.3); }
  .save-ok { animation: pulseOk 0.6s ease; }
  @keyframes pulseOk { 0%{transform:scale(1)} 50%{transform:scale(1.08); box-shadow: 0 0 0 12px rgba(0,255,136,0)} 100%{transform:scale(1)} }
  .skel { background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-card-2) 50%, var(--bg-card) 100%); background-size: 200% 100%; animation: skel 1.2s infinite; }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); margin: 0 6px; transition: all .15s; }
  .pin-dot.filled { background: var(--grass); border-color: var(--grass); }
  .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
  .scroll-x { overflow-x: auto; scrollbar-width: none; }
  .scroll-x::-webkit-scrollbar { display: none; }
  .badge-master { background: linear-gradient(135deg, var(--gold), #ff8c42); color: #2a1d00; }
  .glow-grass { box-shadow: 0 0 20px rgba(0,255,136,0.15); }
  details summary { list-style: none; cursor: pointer; }
  details summary::-webkit-details-marker { display: none; }
  .flag { font-size: 22px; line-height: 1; }
  @media (max-width: 380px) { .input-score { width: 42px; height: 42px; font-size: 19px; } }
  /* ═══ Animación fin de predicciones ═══ */
.overlay-fin {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.overlay-fin video {
  max-width: 100%; max-height: 55vh; border-radius: 16px;
  box-shadow: 0 0 60px rgba(255,200,87,0.4);
}
.overlay-fin h1 {
  font-size: 32px; font-weight: 900;
  background: linear-gradient(135deg, #ffe89c, #ffc857, #b8841e);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center; margin: 24px 0 8px;
  animation: pulseGold 1.5s ease-in-out infinite;
}
@keyframes pulseGold { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.overlay-fin .sub { color: #e8f0ec; font-size: 14px; margin-bottom: 24px; text-align: center; }
.confetti {
  position: absolute; font-size: 24px; pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  0%{transform:translateY(-20px) rotate(0deg); opacity:1}
  100%{transform:translateY(110vh) rotate(720deg); opacity:0.6}
}

═══════════════════════════════════════════════════════════════
  SQL PARA CREAR EN SUPABASE (consola → SQL Editor → run)
═══════════════════════════════════════════════════════════════

create table if not exists usuarios (
  id uuid primary key default gen_random_uuid(),
  nombre text unique not null,
  pin_hash text not null,
  created_at timestamptz default now()
);

create table if not exists predicciones (
  id uuid primary key default gen_random_uuid(),
  user_id uuid references usuarios(id) on delete cascade,
  match_id text not null,
  gol_local int not null,
  gol_visitante int not null,
  tendencia text not null,           -- '1' | 'X' | '2'
  cuota_apostada numeric,
  multiplicador numeric,
  fase text not null,                -- 'grupos' | 'r32' | 'r16' | 'qf' | 'sf' | 'tercer' | 'final'
  updated_at timestamptz default now(),
  unique(user_id, match_id)
);

create table if not exists resultados (
  match_id text primary key,
  gol_local int not null,
  gol_visitante int not null,
  updated_at timestamptz default now()
);

create table if not exists cuotas (
  match_id text primary key,
  cuota_1 numeric not null,
  cuota_x numeric not null,
  cuota_2 numeric not null,
  fuente text default 'estimacion',
  updated_at timestamptz default now()
);

create table if not exists config (
  key text primary key,
  value jsonb not null
);

create table if not exists predicciones_premios (
  user_id uuid primary key references usuarios(id) on delete cascade,
  pichichi text,
  balon_oro text,
  guante_oro text,
  updated_at timestamptz default now()
);

create table if not exists resultados_premios (
  id int primary key default 1,
  pichichi text,
  balon_oro text,
  guante_oro text,
  updated_at timestamptz default now(),
  check (id = 1)
);

-- Permitir lectura/escritura anónima (es una porra de cuadrilla, no datos sensibles)
alter table usuarios enable row level security;
alter table predicciones enable row level security;
alter table resultados enable row level security;
alter table cuotas enable row level security;
alter table config enable row level security;
alter table predicciones_premios enable row level security;
alter table resultados_premios enable row level security;

create policy "open_read"  on usuarios     for select using (true);
create policy "open_write" on usuarios     for insert with check (true);
create policy "open_all_pred"   on predicciones for all using (true) with check (true);
create policy "open_read_res"   on resultados   for select using (true);
create policy "open_write_res"  on resultados   for all using (true) with check (true);
create policy "open_read_cuo"   on cuotas       for select using (true);
create policy "open_write_cuo"  on cuotas       for all using (true) with check (true);
create policy "open_all_conf"   on config       for all using (true) with check (true);
create policy "open_all_prem"   on predicciones_premios for all using (true) with check (true);
create policy "open_all_resprem" on resultados_premios   for all using (true) with check (true);

═══════════════════════════════════════════════════════════════
-->

async function hashPin(pin) {
  const buf = new TextEncoder().encode(pin + ':porra2026');
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function tendencia(gl, gv) { return gl > gv ? '1' : gl < gv ? '2' : 'X'; }

// CIERRE GLOBAL DE PREDICCIONES
// ═══════════════════════════════════════════════════════════════
// 11 jun 2026 a las 20:59 hora Madrid (1 min antes del partido inaugural).
// Hora Madrid en verano = UTC+2 → 20:59 Madrid = 18:59 UTC.
// Cuando llegue ese momento, NADIE puede editar nada (partidos, premios, todo).
const CIERRE_GLOBAL = new Date(Date.UTC(2026, 5, 11, 18, 59, 0));

function prediccionesAbiertas() {
  return Date.now() < CIERRE_GLOBAL.getTime();
}

function tiempoHastaCierreGlobal() {
  const diff = CIERRE_GLOBAL.getTime() - Date.now();
  if (diff <= 0) return null;
  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
  if (dias > 0) return `${dias}d ${horas}h ${mins}m`;
  if (horas > 0) return `${horas}h ${mins}m`;
  return `${mins}m`;
}
function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return Array.from(root.querySelectorAll(sel)); }
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; }

function toast(msg, type='ok') {
  const colors = { ok:'#00ff88', err:'#ff5470', warn:'#ffb547' };
  const t = el(`<div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${colors[type]};color:#001a0e;padding:10px 18px;border-radius:10px;font-weight:700;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3)">${msg}</div>`);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

// AUTH
// ═══════════════════════════════════════════════════════════════
async function login(nombre, pin) {
  nombre = nombre.trim();
  if (!nombre || pin.length !== 4) throw new Error('Datos inválidos');
  const ph = await hashPin(pin);

  if (!SUPA_ON) {
    // Modo offline: localStorage only
    const localUid = 'local_' + nombre.toLowerCase();
    return { id: localUid, nombre };
  }

  // Buscar usuario (case-insensitive para evitar Alex vs alex como cuentas distintas)
  let { data: matches } = await supa.from('usuarios').select('*').ilike('nombre', nombre);
  const existing = matches && matches.length ? matches[0] : null;
  if (existing) {
    if (existing.pin_hash !== ph) throw new Error('PIN incorrecto');
    return { id: existing.id, nombre: existing.nombre };
  }
  // Crear nuevo
  const { data: created, error } = await supa.from('usuarios').insert({ nombre, pin_hash: ph }).select().single();
  if (error) {
    if (error.code === '23505') throw new Error('Ese nombre ya está en uso');
    throw new Error('No se pudo crear: ' + error.message);
  }
  return { id: created.id, nombre: created.nombre };
}

async function cargarCuotas() {
  // 1) DB → 2) localStorage → 3) iniciales
  if (SUPA_ON) {
    const { data } = await supa.from('cuotas').select('*');
    if (data && data.length) {
      data.forEach(c => State.cuotas[c.match_id] = [c.cuota_1, c.cuota_x, c.cuota_2]);
      State.cuotasModificadas = data.some(c => c.fuente && c.fuente !== 'estimacion');
      LS.saveCuotas(State.cuotas);
      return;
    }
  }
  const ls = LS.loadCuotas();
  if (ls) State.cuotas = ls;
}

async function cargarResultados() {
  if (SUPA_ON) {
    const { data } = await supa.from('resultados').select('*');
    if (data) {
      State.resultados = {};
      data.forEach(r => State.resultados[r.match_id] = { gl: r.gol_local, gv: r.gol_visitante });
      LS.saveResults(State.resultados);
      return;
    }
  }
  State.resultados = LS.loadResults();
}

// ═══════════════════════════════════════════════════════════════
// MOTOR DE SIMULACIÓN: Standings, terceros, bracket
// ═══════════════════════════════════════════════════════════════
function calcularStandings(predOrRes) {
  // predOrRes: { match_id: { gl, gv } }
  const tabla = {};
  Object.keys(GRUPOS).forEach(g => {
    tabla[g] = GRUPOS[g].map(eq => ({ eq, pts:0, gf:0, gc:0, dg:0, j:0, v:0, e:0, d:0 }));
  });
  PARTIDOS_GRUPOS.forEach(([mid, grupo, loc, vis]) => {
    const r = predOrRes[mid];
    if (!r) return;
    const fila_l = tabla[grupo].find(x => x.eq === loc);
    const fila_v = tabla[grupo].find(x => x.eq === vis);
    fila_l.j++; fila_v.j++;
    fila_l.gf += r.gl; fila_l.gc += r.gv;
    fila_v.gf += r.gv; fila_v.gc += r.gl;
    if (r.gl > r.gv)      { fila_l.pts += 3; fila_l.v++; fila_v.d++; }
    else if (r.gl < r.gv) { fila_v.pts += 3; fila_v.v++; fila_l.d++; }
    else                  { fila_l.pts++; fila_v.pts++; fila_l.e++; fila_v.e++; }
  });
  Object.keys(tabla).forEach(g => {
    tabla[g].forEach(x => x.dg = x.gf - x.gc);
    tabla[g].sort((a,b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf || a.eq.localeCompare(b.eq));
  });
  return tabla;
}

function getEquipoFromSlot(slot, standings, tercerosAsignados) {
  // slot tipo 'A1', 'B2', 'T_ABCDF'
  if (slot.startsWith('T_')) {
    return tercerosAsignados[slot] || null;
  }
  const grupo = slot[0];
  const pos = parseInt(slot[1]) - 1;
  if (!standings[grupo] || !standings[grupo][pos]) return null;
  return standings[grupo][pos].eq;
}

function asignarTerceros(standings) {
  // Coge los 12 terceros, ordena por (pts, dg, gf), selecciona los 8 mejores
  const terceros = Object.keys(GRUPOS).map(g => ({
    grupo: g,
    fila: standings[g][2] // 3º clasificado
  })).filter(x => x.fila && x.fila.j === 3); // solo si han jugado los 3 partidos
  if (terceros.length < 12) return null; // no todos los grupos completos
  terceros.sort((a,b) => b.fila.pts - a.fila.pts || b.fila.dg - a.fila.dg || b.fila.gf - a.fila.gf);
  const top8 = terceros.slice(0, 8);
  const gruposClasificados = top8.map(x => x.grupo).sort();
  // Slots a asignar (cada uno acepta terceros de unos grupos concretos):
  const slots = [
    { id: 'T_ABCDF', acepta: ['A','B','C','D','F'] },
    { id: 'T_CDFGH', acepta: ['C','D','F','G','H'] },
    { id: 'T_CEFHI', acepta: ['C','E','F','H','I'] },
    { id: 'T_EHIJK', acepta: ['E','H','I','J','K'] },
    { id: 'T_AEHIJ', acepta: ['A','E','H','I','J'] },
    { id: 'T_BEFIJ', acepta: ['B','E','F','I','J'] },
    { id: 'T_EFGIJ', acepta: ['E','F','G','I','J'] },
    { id: 'T_DEIJL', acepta: ['D','E','I','J','L'] },
  ];
  // Asignación greedy con backtracking simple
  const asignacion = {};
  const usados = new Set();
  function asignar(idx) {
    if (idx === slots.length) return true;
    const slot = slots[idx];
    const candidatos = top8.filter(t => !usados.has(t.grupo) && slot.acepta.includes(t.grupo));
    for (const c of candidatos) {
      asignacion[slot.id] = c.fila.eq;
      usados.add(c.grupo);
      if (asignar(idx+1)) return true;
      delete asignacion[slot.id];
      usados.delete(c.grupo);
    }
    return false;
  }
  if (!asignar(0)) return null; // no se pudo asignar (raro)
  return asignacion;
}

function buildBracket(predicciones) {
  // Construye el bracket entero a partir de las predicciones del usuario
  // Retorna: { grupos: {tabla}, r32: [...], r16: [...], qf: [...], sf: [...], tercer, final, tercerosAsig }
  const stand = calcularStandings(predicciones);
  const tercerosAsig = asignarTerceros(stand);

  const result = { grupos: stand, tercerosAsig, r32: [], r16: [], qf: [], sf: [], tercer: null, final: null };

  // R32
  R32_SLOTS.forEach(([mid, sL, sV]) => {
    const local = getEquipoFromSlot(sL, stand, tercerosAsig || {});
    const vis = getEquipoFromSlot(sV, stand, tercerosAsig || {});
    const pred = predicciones[mid];
    let ganador = null;
    if (local && vis && pred) {
      ganador = pred.gl > pred.gv ? local : pred.gl < pred.gv ? vis : null; // empate no permitido en knockout
      if (!ganador) ganador = local; // si empate (no debería), avanza local por defecto en simulación
    }
    result.r32.push({ mid, local, vis, pred, ganador });
  });

  // R16
  R16_SLOTS.forEach(([mid, i1, i2]) => {
    const local = result.r32[i1-1]?.ganador;
    const vis = result.r32[i2-1]?.ganador;
    const pred = predicciones[mid];
    let ganador = null;
    if (local && vis && pred) ganador = pred.gl >= pred.gv ? local : vis;
    result.r16.push({ mid, local, vis, pred, ganador });
  });

  // QF
  QF_SLOTS.forEach(([mid, i1, i2]) => {
    const local = result.r16[i1-1]?.ganador;
    const vis = result.r16[i2-1]?.ganador;
    const pred = predicciones[mid];
    let ganador = null;
    if (local && vis && pred) ganador = pred.gl >= pred.gv ? local : vis;
    result.qf.push({ mid, local, vis, pred, ganador });
  });

  // SF
  SF_SLOTS.forEach(([mid, i1, i2]) => {
    const local = result.qf[i1-1]?.ganador;
    const vis = result.qf[i2-1]?.ganador;
    const pred = predicciones[mid];
    let ganador = null, perdedor = null;
    if (local && vis && pred) {
      ganador = pred.gl >= pred.gv ? local : vis;
      perdedor = ganador === local ? vis : local;
    }
    result.sf.push({ mid, local, vis, pred, ganador, perdedor });
  });

  // 3er puesto y Final
  const f3 = predicciones['TERCER'];
  const fF = predicciones['FINAL'];
  result.tercer = {
    mid: 'TERCER',
    local: result.sf[0]?.perdedor, vis: result.sf[1]?.perdedor,
    pred: f3
  };
  result.final = {
    mid: 'FINAL',
    local: result.sf[0]?.ganador, vis: result.sf[1]?.ganador,
    pred: fF
  };

  return result;
}

// ═══════════════════════════════════════════════════════════════
// MOTOR DE PUNTUACIÓN
// ═══════════════════════════════════════════════════════════════
// Puntos de supervivencia: equipos que llegan a cada ronda
const PTS_SUPERVIVENCIA = { r32: 0, r16: 2, qf: 3, sf: 5, final: 8, campeon: 12 };
const PTS_CRUCE_TENDENCIA = 2;   // Pts si tu cruce coincide y aciertas ganador
const PTS_CRUCE_EXACTO = 3;      // Extra si además aciertas marcador
const ORDEN_RONDAS = ['r32','r16','qf','sf','final','campeon'];

function rondaMaxAlcanzada(b, eq) {
  if (!b.r32.some(p => p.local === eq || p.vis === eq)) return null;
  if (!b.r16.some(p => p.local === eq || p.vis === eq)) return 'r32';
  if (!b.qf.some(p => p.local === eq || p.vis === eq)) return 'r16';
  if (!b.sf.some(p => p.local === eq || p.vis === eq)) return 'qf';
  const enFinal = b.final && (b.final.local === eq || b.final.vis === eq);
  const enTercer = b.tercer && (b.tercer.local === eq || b.tercer.vis === eq);
  if (!enFinal && !enTercer) return 'sf';
  if (enFinal && b.final.pred) {
    const ganador = b.final.pred.gl >= b.final.pred.gv ? b.final.local : b.final.vis;
    return ganador === eq ? 'campeon' : 'final';
  }
  return enFinal ? 'final' : 'sf';
}

function buscarPartidoEnBracket(b, mid) {
  return b.r32.find(x=>x.mid===mid) || b.r16.find(x=>x.mid===mid) ||
         b.qf.find(x=>x.mid===mid)  || b.sf.find(x=>x.mid===mid)  ||
         (mid==='TERCER' ? b.tercer : mid==='FINAL' ? b.final : null);
}

function puntuarUsuario(predicciones, premiosUser) {
  let total = 0, underdog = 0, aciertosT = 0, aciertosE = 0;
  let porFase = { grupos:0, ko:0 };
  let supervivencia = 0, cruces = 0, premios = 0;

  const bracketUser = buildBracket(predicciones);
  const bracketOf = buildBracket(
    Object.fromEntries(Object.entries(State.resultados).map(
      ([k,v]) => [k, {gl: v.gl, gv: v.gv, fase: 'auto', tend: tendencia(v.gl, v.gv)}]
    ))
  );

  // ──── GRUPOS ────
  Object.entries(predicciones).forEach(([mid, p]) => {
    if (p.fase !== 'grupos') return;
    const real = State.resultados[mid];
    if (!real) return;
    const tendReal = tendencia(real.gl, real.gv);
    let puntos = 0;
    if (p.tend === tendReal) {
      aciertosT++;
      if (p.mult) {
        puntos = PUNTOS_BASE * p.mult;
        if (p.mult >= UNDERDOG_THRESHOLD) underdog += puntos;
      } else { puntos = PUNTOS_BASE; }
      if (p.gl === real.gl && p.gv === real.gv) {
        puntos += BONUS_EXACTO; aciertosE++;
      }
    }
    total += puntos; porFase.grupos += puntos;
  });

  // ──── SUPERVIVENCIA POR EQUIPO ────
  // Por cada equipo: hasta qué ronda llegó en mi bracket y en el oficial.
  // Premio por la ronda MÍNIMA común (es decir, hasta donde ambos coinciden que llegó).
  Object.keys(EQUIPOS).forEach(eq => {
    const um = rondaMaxAlcanzada(bracketUser, eq);
    const om = rondaMaxAlcanzada(bracketOf, eq);
    if (!um || !om) return;
    const minIdx = Math.min(ORDEN_RONDAS.indexOf(um), ORDEN_RONDAS.indexOf(om));
    for (let i = 1; i <= minIdx; i++) {
      supervivencia += PTS_SUPERVIVENCIA[ORDEN_RONDAS[i]];
    }
  });

  // ──── CRUCES KO (extra si los dos equipos coinciden) ────
  Object.entries(predicciones).forEach(([mid, p]) => {
    if (p.fase === 'grupos') return;
    const real = State.resultados[mid];
    if (!real) return;
    const eUser = buscarPartidoEnBracket(bracketUser, mid);
    const eOf = buscarPartidoEnBracket(bracketOf, mid);
    if (!eUser?.local || !eUser?.vis || !eOf?.local || !eOf?.vis) return;
    const set1 = new Set([eUser.local, eUser.vis]);
    const set2 = new Set([eOf.local, eOf.vis]);
    if (set1.size !== 2 || set2.size !== 2) return;
    let coinciden = true;
    set1.forEach(e => { if (!set2.has(e)) coinciden = false; });
    if (!coinciden) return;
    // Cruces coinciden → comparar resultado (invirtiendo si el orden local/vis es distinto)
    let predGL = p.gl, predGV = p.gv;
    if (eUser.local !== eOf.local) { predGL = p.gv; predGV = p.gl; }
    const tendReal = tendencia(real.gl, real.gv);
    const tendPred = tendencia(predGL, predGV);
    let pts = 0;
    if (tendPred === tendReal) {
      aciertosT++;
      pts = PTS_CRUCE_TENDENCIA;
      if (predGL === real.gl && predGV === real.gv) {
        pts += PTS_CRUCE_EXACTO; aciertosE++;
      }
    }
    cruces += pts;
  });

  total += supervivencia + cruces;
  porFase.ko = supervivencia + cruces;

  // ──── PREMIOS INDIVIDUALES ────
  if (premiosUser && State.resultadosPremios) {
    if (premiosUser.pichichi && premiosUser.pichichi === State.resultadosPremios.pichichi)     premios += PUNTOS_PICHICHI;
    if (premiosUser.balon_oro && premiosUser.balon_oro === State.resultadosPremios.balon_oro)  premios += PUNTOS_BALON_ORO;
    if (premiosUser.guante_oro && premiosUser.guante_oro === State.resultadosPremios.guante_oro) premios += PUNTOS_GUANTE_ORO;
  }
  total += premios;

  return {
    total: Math.round(total * 10) / 10,
    underdog: Math.round(underdog * 10) / 10,
    aciertosT, aciertosE, porFase,
    supervivencia: Math.round(supervivencia*10)/10,
    cruces: Math.round(cruces*10)/10,
    premios: Math.round(premios*10)/10,
  };
}

function calcularLeaderboard() {
  const filas = State.allUsers.map(u => {
    const preds = State.allPredicciones[u.id] || {};
    const prem  = State.allPremios[u.id] || {};
    const score = puntuarUsuario(preds, prem);
    return { ...u, ...score };
  });
  filas.sort((a,b) => b.total - a.total || b.aciertosE - a.aciertosE);
  // Underdog master: el de mayor puntuación underdog (si >0)
  let masterId = null, max = 0;
  filas.forEach(f => { if (f.underdog > max) { max = f.underdog; masterId = f.id; } });
  return { filas, masterId };
}

// ═══════════════════════════════════════════════════════════════
// HISTÓRICO DE PUNTUACIÓN (para gráfica de evolución)
// ═══════════════════════════════════════════════════════════════
function calcularHistorico() {
  // Orden cronológico de partidos por id (los IDs de grupos van A1..L6 y luego R32, R16...
  // pero el orden lógico es el de PARTIDOS_GRUPOS y luego eliminatorias)
  const ordenPartidos = [
    ...PARTIDOS_GRUPOS.map(p => p[0]),
    ...R32_SLOTS.map(s => s[0]),
    ...R16_SLOTS.map(s => s[0]),
    ...QF_SLOTS.map(s => s[0]),
    ...SF_SLOTS.map(s => s[0]),
    'TERCER', 'FINAL'
  ];
  // Filtra solo los que tienen resultado oficial, en orden
  const conResultado = ordenPartidos.filter(mid => State.resultados[mid]);
  if (conResultado.length === 0) return null;

  // Para cada checkpoint (cada partido completado), calcular puntos de cada user
  const serie = []; // [{label, snapshot: {userId: puntos}}]
  // Copia provisional de resultados para ir construyendo
  const resultadosOriginales = State.resultados;
  let resultadosParciales = {};
  conResultado.forEach((mid, idx) => {
    resultadosParciales[mid] = resultadosOriginales[mid];
    // Recalcular puntos usando esos resultados parciales
    const resGuardados = State.resultados;
    State.resultados = resultadosParciales;
    const snapshot = {};
    State.allUsers.forEach(u => {
      const preds = State.allPredicciones[u.id] || {};
      const prem = State.allPremios[u.id] || {};
      snapshot[u.id] = puntuarUsuario(preds, prem).total;
    });
    State.resultados = resGuardados;
    serie.push({ label: mid, snapshot });
  });
  return serie;
}

function renderGraficaEvolucion(serie) {
  if (!serie || serie.length === 0) return '';
  const W = 320, H = 200, padL = 30, padR = 10, padT = 10, padB = 30;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  // Máximo de puntos para escala Y
  let maxPts = 0;
  serie.forEach(s => Object.values(s.snapshot).forEach(v => { if (v > maxPts) maxPts = v; }));
  if (maxPts < 10) maxPts = 10;
  maxPts = Math.ceil(maxPts / 10) * 10;
  // Colores por jugador (paleta cíclica)
  const colores = ['#00ff88','#ffc857','#ff5470','#5ec3ff','#c876ff','#ff8c42','#76ff8c','#ffb547','#ff76d4','#76d4ff','#d4ff76','#ff7676'];
  const usuarios = State.allUsers.map((u, i) => ({ ...u, color: colores[i % colores.length] }));

  // Eje X: idx 0..serie.length-1
  const x = (i) => padL + (serie.length === 1 ? innerW/2 : (i / (serie.length-1)) * innerW);
  const y = (v) => padT + innerH - (v / maxPts) * innerH;

  // Líneas
  const polylines = usuarios.map(u => {
    const pts = serie.map((s, i) => `${x(i).toFixed(1)},${y(s.snapshot[u.id] || 0).toFixed(1)}`).join(' ');
    return `<polyline fill="none" stroke="${u.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>`;
  }).join('');

  // Eje Y (líneas guía cada 25% del max)
  const guias = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const v = Math.round(maxPts * f);
    return `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="#243029" stroke-width="0.5"/>
            <text x="${padL-4}" y="${y(v)+3}" fill="#8a9a93" font-size="9" text-anchor="end">${v}</text>`;
  }).join('');

  // Etiqueta inicio y fin del eje X
  const xLabels = `<text x="${padL}" y="${H-10}" fill="#8a9a93" font-size="9">${serie[0].label}</text>
                   <text x="${W-padR}" y="${H-10}" fill="#8a9a93" font-size="9" text-anchor="end">${serie[serie.length-1].label}</text>`;

  // Leyenda
  const leyenda = usuarios.map(u => {
    const puntos = serie[serie.length-1].snapshot[u.id] || 0;
    return `<div class="flex items-center gap-2 text-xs"><span style="width:10px;height:10px;border-radius:50%;background:${u.color};display:inline-block"></span><span class="truncate">${u.nombre}</span><span class="ml-auto font-bold" style="color:var(--text-dim)">${puntos.toFixed(0)}</span></div>`;
  }).join('');

  return `
    <div class="card p-4 mt-4">
      <h3 class="font-bold text-sm mb-3">📈 Evolución del ranking</h3>
      <svg viewBox="0 0 ${W} ${H}" class="w-full" style="background:var(--bg-card-2); border-radius:8px">
        ${guias}
        ${polylines}
        ${xLabels}
      </svg>
      <div class="mt-3 grid grid-cols-2 gap-x-4 gap-y-1">${leyenda}</div>
      <div class="text-[10px] mt-3" style="color:var(--text-dim)">
        Cada punto del eje X es un partido completado oficialmente. La línea muestra los puntos acumulados de cada jugador.
      </div>
    </div>
  `;
}

  const cont = $('#partidos-container');

  cont.innerHTML = jornadas.map(j => {
    const partidos = PARTIDOS_GRUPOS.filter(p => p[5] === j);
    return `
      <section class="mb-6">

        <div class="space-y-2">

  }).join('');
  enlazarInputsPartido();
}

function cardPartidoGrupo(p) {
  const [mid, grupo, loc, vis, fecha] = p;
  const eqL = EQUIPOS[loc], eqV = EQUIPOS[vis];
  const cuotas = State.cuotas[mid] || [2,3,3];
  const pred = State.predicciones[mid] || {};
  const tend = (pred.gl != null && pred.gv != null) ? tendencia(pred.gl, pred.gv) : null;
  const cuotaApostada = tend ? (tend==='1'?cuotas[0]:tend==='X'?cuotas[1]:cuotas[2]) : null;
  const mult = cuotaApostada ? multiplicadorPorCuota(cuotaApostada) : null;
  const multPill = mult ? `<span class="pill ${pillClassMult(mult)}">×${mult.toFixed(1)}</span>` : `<span class="pill pill-x1" style="opacity:0.4">—</span>`;
  const puntosMax = mult ? (PUNTOS_BASE * mult + BONUS_EXACTO).toFixed(1) : '—';

  return `
    <div class="card p-3" data-mid="${mid}">
      <div class="flex items-center justify-between text-[10px] mb-2" style="color:var(--text-dim)">
        <span class="font-bold">Grupo ${grupo} · ${fecha}</span>
        <span class="flex items-center gap-2">${multPill}<span>máx ${puntosMax}pt</span></span>
      </div>
      <div class="flex items-center gap-2">
        <div class="flex-1 flex items-center gap-2 min-w-0">
          <span class="flag">${eqL.flag}</span>
          <div class="min-w-0">
            <div class="font-bold text-sm truncate">${eqL.name}</div>
            <div class="text-[10px]" style="color:var(--text-dim)">#${eqL.rank} · @${cuotas[0]}</div>
          </div>
        </div>
        <input class="input-score score-l ${pred.gl!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gl!=null?pred.gl:''}" data-mid="${mid}" data-side="l">
        <span style="color:var(--text-dim)">-</span>
        <input class="input-score score-v ${pred.gv!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gv!=null?pred.gv:''}" data-mid="${mid}" data-side="v">
        <div class="flex-1 flex items-center gap-2 min-w-0 justify-end text-right">
          <div class="min-w-0">
            <div class="font-bold text-sm truncate">${eqV.name}</div>
            <div class="text-[10px]" style="color:var(--text-dim)">#${eqV.rank} · @${cuotas[2]}</div>
          </div>
          <span class="flag">${eqV.flag}</span>
        </div>
      </div>
      <div class="flex justify-center gap-3 mt-2 text-[10px]" style="color:var(--text-dim)">
        <span>1 @${cuotas[0]}</span><span>X @${cuotas[1]}</span><span>2 @${cuotas[2]}</span>
      </div>
    </div>
  `;
}

function renderPartidosKO(fase) {
  const cont = $('#partidos-container');

  // ──── VALIDACIÓN: solo permitir entrar en una fase KO si la anterior está completa ────
  const requisitos = {
    r32:   { tipo:'grupos', total: PARTIDOS_GRUPOS.length, label:'fase de grupos' },
    r16:   { tipo:'r32', total: R32_SLOTS.length, label:'32avos' },
    qf:    { tipo:'r16', total: R16_SLOTS.length, label:'octavos' },
    sf:    { tipo:'qf',  total: QF_SLOTS.length,  label:'cuartos' },
    final: { tipo:'sf',  total: SF_SLOTS.length,  label:'semifinales' },
  };
  const req = requisitos[fase];
  let predichosFasePrev = 0;
  if (req) {
    if (req.tipo === 'grupos') {
      predichosFasePrev = PARTIDOS_GRUPOS.filter(p => State.predicciones[p[0]]).length;
    } else {
      const slotMap = { r32: R32_SLOTS, r16: R16_SLOTS, qf: QF_SLOTS, sf: SF_SLOTS };
      predichosFasePrev = slotMap[req.tipo].filter(s => State.predicciones[s[0]]).length;
    }
  }
  if (req && predichosFasePrev < req.total) {
    cont.innerHTML = `
      <div class="card p-8 text-center">
        <div class="text-5xl mb-3">🔒</div>
        <div class="font-bold text-base mb-2">Bloqueado</div>
        <div class="text-sm mb-4" style="color:var(--text-dim)">
          Termina las predicciones de <b style="color:var(--grass)">${req.label}</b> primero.<br>
          Llevas <b>${predichosFasePrev}/${req.total}</b> partidos.
        </div>
        <div class="w-full h-2 rounded-full mx-auto" style="background:var(--bg-card-2); max-width:240px">
          <div class="h-full rounded-full" style="background:var(--grass); width:${(predichosFasePrev/req.total*100).toFixed(0)}%"></div>
        </div>
        <div class="text-[10px] mt-4" style="color:var(--text-dim)">
          Los cruces de cada ronda se calculan a partir de tus predicciones de la ronda anterior.
        </div>
      </div>
    `;
    return;
  }

  // ──── A partir de aquí, la fase anterior está completa: pintar el bracket ────
  const bracket = buildBracket(State.predicciones);
  const sectionsMap = {
    r32:   { titulo:'32avos de final', items: bracket.r32 },
    r16:   { titulo:'Octavos de final', items: bracket.r16 },
    qf:    { titulo:'Cuartos de final', items: bracket.qf },
    sf:    { titulo:'Semifinales', items: bracket.sf },
    final: { titulo:'Final + 3er puesto', items: [bracket.tercer, bracket.final].filter(x=>x) }
  };
  const sec = sectionsMap[fase];

  cont.innerHTML = `
    <h2 class="text-xs font-bold uppercase tracking-wider mb-3 px-1" style="color:var(--text-dim)">${sec.titulo}</h2>
    <div class="card p-3 mb-3 text-xs" style="background:rgba(0,255,136,0.05); border-color:rgba(0,255,136,0.2)">
      💡 Estos cruces son SEGÚN TUS PREDICCIONES. Si el bracket oficial acaba siendo distinto, ganarás puntos igualmente por los equipos que acertaste que llegaban a esta ronda (supervivencia).
    </div>
    <div class="space-y-2">${sec.items.map(it => cardPartidoKO(it, fase)).join('')}</div>
  `;
  enlazarInputsPartido();
}

function cardPartidoKO(it, fase) {
  if (!it) return '';
  const mid = it.mid;
  const eqL = it.local ? EQUIPOS[it.local] : null;
  const eqV = it.vis ? EQUIPOS[it.vis] : null;
  const pred = State.predicciones[mid] || {};
  const isFinal3 = mid === 'TERCER';
  const isFinal = mid === 'FINAL';
  const label = isFinal ? '🏆 GRAN FINAL' : isFinal3 ? '🥉 3er Puesto' : '';

  const disabled = (!eqL || !eqV);
  return `
    <div class="card p-3 ${isFinal?'glow-grass':''}" data-mid="${mid}" ${isFinal?'style="border-color:var(--gold)"':''}>
      <div class="flex items-center justify-between text-[10px] mb-2" style="color:var(--text-dim)">
        <span class="font-bold">${mid}${label?' · '+label:''}</span>
        <span>máx ${PTS_CRUCE_TENDENCIA + PTS_CRUCE_EXACTO}pt por cruce + supervivencia</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="flex-1 flex items-center gap-2 min-w-0">
          <span class="flag">${eqL ? eqL.flag : '⬜'}</span>
          <div class="min-w-0">
            <div class="font-bold text-sm truncate">${eqL ? eqL.name : '—'}</div>
          </div>
        </div>
        <input class="input-score score-l ${pred.gl!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gl!=null?pred.gl:''}" data-mid="${mid}" data-side="l" ${disabled?'disabled':''}>
        <span style="color:var(--text-dim)">-</span>
        <input class="input-score score-v ${pred.gv!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gv!=null?pred.gv:''}" data-mid="${mid}" data-side="v" ${disabled?'disabled':''}>
        <div class="flex-1 flex items-center gap-2 min-w-0 justify-end text-right">
          <div class="min-w-0">
            <div class="font-bold text-sm truncate">${eqV ? eqV.name : '—'}</div>
          </div>
          <span class="flag">${eqV ? eqV.flag : '⬜'}</span>
        </div>
      </div>
      ${!isFinal3 ? '<div class="text-center text-[10px] mt-2" style="color:var(--text-dim)">(empates no permitidos en eliminatorias — pon el resultado tras prórroga/penaltis)</div>':''}
    </div>
  `;
}

function enlazarInputsPartido() {
  $$('.input-score').forEach(inp => {
    inp.addEventListener('input', async e => {
      const mid = e.target.dataset.mid;
      const side = e.target.dataset.side;

      // Bloqueo global: si ya pasó el cierre, nadie edita nada
      if (!prediccionesAbiertas()) {
        e.target.value = '';
        toast('🔒 Predicciones cerradas (11 jun 20:59)', 'err');
        return;
      }

      const val = e.target.value.replace(/\D/g,'');
      e.target.value = val;
      if (val === '') return;
      const num = parseInt(val);
      if (isNaN(num)) return;

      const partidoGrupo = PARTIDOS_GRUPOS.find(p => p[0] === mid);
      const fase = partidoGrupo ? 'grupos' : (mid.startsWith('R32')?'r32':mid.startsWith('R16')?'r16':mid.startsWith('QF')?'qf':mid.startsWith('SF')?'sf':mid==='TERCER'?'tercer':'final');

      const actual = State.predicciones[mid] || {};
      if (side === 'l') actual.gl = num; else actual.gv = num;

      if (actual.gl != null && actual.gv != null) {
        const cuotas = State.cuotas[mid];
        await guardarPrediccion(mid, actual.gl, actual.gv, fase, cuotas);
        if (Object.keys(State.predicciones).length === 104) {
          setTimeout(() => mostrarFinAnimacion(), 400);
        }
        e.target.classList.add('filled');
        // Repintar para que multiplicador y pill se actualicen
        if (fase === 'grupos') {
          const card = e.target.closest('[data-mid]');
          const p = PARTIDOS_GRUPOS.find(x => x[0] === mid);
          if (card && p) card.outerHTML = cardPartidoGrupo(p);
          enlazarInputsPartido();
        }
      } else {
        State.predicciones[mid] = actual;
        LS.savePred(State.user.id, State.predicciones);
      }
    });
  });
}

function renderPremios() {

  const res = State.resultadosPremios;

      <p class="text-xs" style="color:var(--text-dim)">

      </p>

    ${bloque('⚽', 'Pichichi (máximo goleador)', 'El jugador que más goles meta en todo el Mundial', 'pichichi', CANDIDATOS_PICHICHI, PUNTOS_PICHICHI)}

    ${bloque('🧤', 'Guante de Oro (mejor portero)', 'El mejor portero del torneo según FIFA', 'guante_oro', CANDIDATOS_GUANTE_ORO, PUNTOS_GUANTE_ORO)}

    <button id="btn-save-premios" class="float-save btn btn-primary flex items-center gap-2 shadow-2xl">
      ☁ Guardar
    </button>
  `;

  $$('.premio-select').forEach(sel => {
    sel.addEventListener('change', e => {
      if (!prediccionesAbiertas()) {
        toast('🔒 Predicciones cerradas', 'err');
        e.target.value = State.premios[e.target.dataset.campo] || '';
        return;
      }
      const campo = e.target.dataset.campo;
      State.premios[campo] = e.target.value || null;
    });
  });

  $('#btn-save-premios').addEventListener('click', async () => {
    const btn = $('#btn-save-premios'); btn.disabled = true; btn.innerHTML = 'Guardando...';
    try {
      await guardarMisPremios();
      btn.classList.add('save-ok'); btn.innerHTML = '✓ Guardado';
      toast('Premios guardados', 'ok');
    } catch(e) {
      btn.innerHTML = '⚠ Error';
      toast('Error al guardar', 'err');
    }
    setTimeout(()=>{ btn.disabled = false; btn.innerHTML = '☁ Guardar'; btn.classList.remove('save-ok'); }, 1800);
  });
}

function renderResumen() {
  const main = $('#main');
  const bracket = buildBracket(State.predicciones);
  const totalPreds = Object.keys(State.predicciones).length;
  const previstos = puntuarUsuario(State.predicciones, State.premios);
  const numCuotas = Object.values(State.predicciones).filter(p => p.fase==='grupos' && p.mult);
  const conteoMult = { 1:0, 1.2:0, 1.4:0, 1.6:0 };
  numCuotas.forEach(p => { if (conteoMult[p.mult] != null) conteoMult[p.mult]++; });

  // Máximo teórico = lo que sacaría si todo lo que predijo se cumple oficialmente
  let maxGrupos = 0;
  Object.values(State.predicciones).forEach(p => {
    if (p.fase === 'grupos' && p.mult) maxGrupos += PUNTOS_BASE * p.mult + BONUS_EXACTO;
  });
  let maxSupervivencia = 0;
  Object.keys(EQUIPOS).forEach(eq => {
    const r = rondaMaxAlcanzada(bracket, eq);
    if (!r) return;
    const idx = ORDEN_RONDAS.indexOf(r);
    for (let i = 1; i <= idx; i++) maxSupervivencia += PTS_SUPERVIVENCIA[ORDEN_RONDAS[i]];
  });
  const koPredichos = Object.values(State.predicciones).filter(p => p.fase !== 'grupos').length;
  const maxCruces = koPredichos * (PTS_CRUCE_TENDENCIA + PTS_CRUCE_EXACTO);
  const puntosMaxTeoricos = maxGrupos + maxSupervivencia + maxCruces;

  const finalEq = bracket.final.local && bracket.final.vis && bracket.final.pred
    ? (bracket.final.pred.gl >= bracket.final.pred.gv ? bracket.final.local : bracket.final.vis)
    : null;

  main.innerHTML = `
    <div class="grid grid-cols-2 gap-2 mb-4">
      <div class="card p-3"><div class="text-[10px] uppercase font-bold" style="color:var(--text-dim)">Predicciones</div><div class="text-2xl font-black">${totalPreds}<span class="text-sm font-normal" style="color:var(--text-dim)">/${PARTIDOS_GRUPOS.length + 32}</span></div></div>
      <div class="card p-3"><div class="text-[10px] uppercase font-bold" style="color:var(--text-dim)">Puntos máx posibles</div><div class="text-2xl font-black" style="color:var(--gold)">${puntosMaxTeoricos.toFixed(0)}</div></div>
      <div class="card p-3"><div class="text-[10px] uppercase font-bold" style="color:var(--text-dim)">Puntos actuales</div><div class="text-2xl font-black" style="color:var(--grass)">${previstos.total}</div></div>
      <div class="card p-3"><div class="text-[10px] uppercase font-bold" style="color:var(--text-dim)">En underdogs</div><div class="text-2xl font-black" style="color:var(--gold)">${previstos.underdog.toFixed(1)}</div></div>
    </div>

    <div class="card p-4 mb-4">
      <h3 class="font-bold text-sm mb-3">Desglose de tu puntuación</h3>
      <div class="grid grid-cols-3 gap-2 text-xs">
        <div class="card-2 p-2 text-center"><div class="font-bold text-lg">${previstos.porFase.grupos.toFixed(1)}</div><div style="color:var(--text-dim)">Grupos</div><div class="text-[10px]" style="color:var(--text-dim)">máx ${maxGrupos.toFixed(0)}</div></div>
        <div class="card-2 p-2 text-center"><div class="font-bold text-lg">${previstos.supervivencia.toFixed(1)}</div><div style="color:var(--text-dim)">Supervivencia</div><div class="text-[10px]" style="color:var(--text-dim)">máx ${maxSupervivencia.toFixed(0)}</div></div>
        <div class="card-2 p-2 text-center"><div class="font-bold text-lg">${previstos.cruces.toFixed(1)}</div><div style="color:var(--text-dim)">Cruces KO</div><div class="text-[10px]" style="color:var(--text-dim)">máx ${maxCruces.toFixed(0)}</div></div>
      </div>
      <div class="text-[10px] mt-3 leading-relaxed" style="color:var(--text-dim)">
        <b>Supervivencia</b>: por cada equipo que predijiste que llegaba lejos y de hecho llega.<br>
        <b>Cruces KO</b>: extra cuando coincide tu cruce simulado con el oficial (+2 ganador, +3 marcador exacto).
      </div>
    </div>

    <div class="card p-4 mb-4">
      <h3 class="font-bold text-sm mb-3">Tu reparto de riesgo (grupos)</h3>
      <div class="space-y-2 text-sm">
        ${[1,1.2,1.4,1.6].map(m => {
          const n = conteoMult[m]; const max = Math.max(...Object.values(conteoMult), 1);
          const pct = (n/max)*100;
          return `<div class="flex items-center gap-3">
            <span class="pill ${pillClassMult(m)}" style="min-width:50px; justify-content:center">×${m.toFixed(1)}</span>
            <div class="flex-1 h-3 rounded-full" style="background:var(--bg-card-2)"><div class="h-full rounded-full" style="width:${pct}%; background:${m>=1.4?'var(--gold)':'var(--grass)'}"></div></div>
            <span class="text-xs font-bold w-10 text-right">${n}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="text-[10px] mt-3" style="color:var(--text-dim)">Cuantas más apuestas en ×1.4 y ×1.6, más arriesgado tu bote.</div>
    </div>

    <div class="card p-4">
      <h3 class="font-bold text-sm mb-3">Tu bracket simulado</h3>
      ${finalEq ? `
        <div class="text-center mb-4">
          <div class="text-xs" style="color:var(--text-dim)">Tu campeón del mundo</div>
          <div class="text-3xl font-black mt-1" style="color:var(--gold)">${EQUIPOS[finalEq].flag} ${EQUIPOS[finalEq].name}</div>
          <div class="text-xs mt-1" style="color:var(--text-dim)">según tus predicciones</div>
        </div>` : `<div class="text-center text-sm py-4" style="color:var(--text-dim)">Completa las predicciones de eliminatorias para ver a tu campeón</div>`}
      ${miniBracket(bracket)}
    </div>
  `;
}

function miniBracket(b) {
  function pintaPartido(item, etiq) {
    if (!item) return '';
    const l = item.local ? `${EQUIPOS[item.local].flag} ${EQUIPOS[item.local].name}` : '—';
    const v = item.vis ? `${EQUIPOS[item.vis].flag} ${EQUIPOS[item.vis].name}` : '—';
    const score = item.pred ? `${item.pred.gl}-${item.pred.gv}` : '·';
    return `<div class="card-2 p-2 text-xs flex justify-between gap-2"><div class="truncate flex-1">${l}</div><div class="font-bold" style="color:var(--grass)">${score}</div><div class="truncate flex-1 text-right">${v}</div></div>`;
  }
  return `
    <div class="space-y-3">
      <div><div class="text-[10px] uppercase font-bold mb-1" style="color:var(--text-dim)">Semifinales</div><div class="space-y-1">${b.sf.map(s => pintaPartido(s,'SF')).join('')}</div></div>
      <div><div class="text-[10px] uppercase font-bold mb-1" style="color:var(--text-dim)">3er puesto</div>${pintaPartido(b.tercer,'TERCER')}</div>
      <div><div class="text-[10px] uppercase font-bold mb-1" style="color:var(--gold)">FINAL 🏆</div>${pintaPartido(b.final,'FINAL')}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: PANEL ADMIN
// ═══════════════════════════════════════════════════════════════
function renderAdmin() {
  const modal = el(`
    <div class="fixed inset-0 z-50 modal-bg flex items-end sm:items-center justify-center p-3">
      <div class="card w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
        <div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--border)">
          <div class="font-bold">⚙ Panel Admin</div>
          <button id="adm-close" class="btn btn-ghost text-xs" style="padding:6px 12px">Cerrar</button>
        </div>
        <div class="flex" style="border-bottom:1px solid var(--border)">
          <button class="adm-tab tab-btn active" data-atab="cuotas">💰 Cuotas</button>
          <button class="adm-tab tab-btn" data-atab="resultados">⚽ Resultados</button>
          <button class="adm-tab tab-btn" data-atab="premios">🏅 Premios</button>
        </div>
        <div id="adm-body" class="flex-1 overflow-y-auto p-4"></div>
      </div>
    </div>
  `);
  document.body.appendChild(modal);
  $('#adm-close').addEventListener('click', () => modal.remove());
  let admTab = 'cuotas';
  function renderAdmBody() {
    $$('.adm-tab').forEach(b => b.classList.toggle('active', b.dataset.atab === admTab));
    if (admTab === 'cuotas') renderAdmCuotas();
    else if (admTab === 'premios') renderAdmPremios();
    else renderAdmResultados();
  }
  $$('.adm-tab').forEach(b => b.addEventListener('click', () => { admTab = b.dataset.atab; renderAdmBody(); }));
  renderAdmBody();
}

function renderAdmCuotas() {
  const body = $('#adm-body');
  body.innerHTML = `
    <p class="text-xs mb-3" style="color:var(--text-dim)">Mete las cuotas reales de Winamax (1, X, 2). Se guardan en la nube al instante.</p>
    <div class="space-y-2">
      ${PARTIDOS_GRUPOS.map(p => {
        const [mid, grupo, loc, vis] = p;
        const c = State.cuotas[mid] || [2,3,3];
        return `<div class="card-2 p-2">
          <div class="flex items-center justify-between text-xs mb-2">
            <span class="font-bold">${EQUIPOS[loc].flag} ${EQUIPOS[loc].name} vs ${EQUIPOS[vis].name} ${EQUIPOS[vis].flag}</span>
            <span style="color:var(--text-dim)">${mid}</span>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <input class="cuota-input bg-transparent border rounded px-2 py-1 text-center text-sm" style="border-color:var(--border)" type="number" step="0.01" min="1" value="${c[0]}" data-mid="${mid}" data-idx="0" placeholder="1">
            <input class="cuota-input bg-transparent border rounded px-2 py-1 text-center text-sm" style="border-color:var(--border)" type="number" step="0.01" min="1" value="${c[1]}" data-mid="${mid}" data-idx="1" placeholder="X">
            <input class="cuota-input bg-transparent border rounded px-2 py-1 text-center text-sm" style="border-color:var(--border)" type="number" step="0.01" min="1" value="${c[2]}" data-mid="${mid}" data-idx="2" placeholder="2">
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
  $$('.cuota-input').forEach(inp => {
    inp.addEventListener('change', async e => {
      const mid = e.target.dataset.mid;
      const idx = parseInt(e.target.dataset.idx);
      const val = parseFloat(e.target.value);
      if (isNaN(val) || val < 1) { toast('Cuota inválida','err'); return; }
      State.cuotas[mid][idx] = val;
      LS.saveCuotas(State.cuotas);
      if (SUPA_ON) {
        const c = State.cuotas[mid];
        const { error } = await supa.from('cuotas').upsert({
          match_id: mid, cuota_1: c[0], cuota_x: c[1], cuota_2: c[2],
          fuente: 'winamax', updated_at: new Date().toISOString()
        });
        if (error) toast('Error al guardar', 'err');
        else { State.cuotasModificadas = true; toast('Cuota actualizada','ok'); }
      } else { toast('Guardado local','ok'); }
    });
  });
}

function renderAdmResultados() {
  const body = $('#adm-body');
  // Calcular bracket oficial a partir de los resultados oficiales (admin)
  // Si admin ha metido todos los resultados de grupos, sabremos qué equipos cruzan en KO
  const bracketOficial = buildBracket(
    Object.fromEntries(Object.entries(State.resultados).map(([k,v]) => [k, {gl: v.gl, gv: v.gv, fase: 'auto', tend: tendencia(v.gl, v.gv)}]))
  );
  function equiposKO(mid) {
    // Devuelve {local, vis} oficiales para un partido KO según los resultados ya metidos
    const buscar = (arr) => arr.find(x => x.mid === mid);
    return buscar(bracketOficial.r32) || buscar(bracketOficial.r16) || buscar(bracketOficial.qf) || buscar(bracketOficial.sf) || (mid==='TERCER'?bracketOficial.tercer:mid==='FINAL'?bracketOficial.final:null);
  }

  const todos = [
    ...PARTIDOS_GRUPOS.map(p => ({ mid:p[0], local:p[2], vis:p[3], etiq:`G${p[1]} J${p[5]}` })),
    ...R32_SLOTS.map((s,i) => { const e = equiposKO(s[0]); return { mid:s[0], local:e?.local, vis:e?.vis, etiq:`32avos ${i+1}` }; }),
    ...R16_SLOTS.map((s,i) => { const e = equiposKO(s[0]); return { mid:s[0], local:e?.local, vis:e?.vis, etiq:`8vos ${i+1}` }; }),
    ...QF_SLOTS.map((s,i)  => { const e = equiposKO(s[0]); return { mid:s[0], local:e?.local, vis:e?.vis, etiq:`Cuartos ${i+1}` }; }),
    ...SF_SLOTS.map((s,i)  => { const e = equiposKO(s[0]); return { mid:s[0], local:e?.local, vis:e?.vis, etiq:`Semis ${i+1}` }; }),
    (() => { const e = equiposKO('TERCER'); return { mid:'TERCER', local:e?.local, vis:e?.vis, etiq:'3er puesto' }; })(),
    (() => { const e = equiposKO('FINAL');  return { mid:'FINAL',  local:e?.local, vis:e?.vis, etiq:'FINAL' }; })(),
  ];
  body.innerHTML = `
    <p class="text-xs mb-3" style="color:var(--text-dim)">Marca el resultado oficial de cada partido cuando termine. Esto dispara el cálculo de puntos.</p>
    <div class="space-y-2">
      ${todos.map(t => {
        const r = State.resultados[t.mid] || {};
        const eqL = t.local ? EQUIPOS[t.local] : null;
        const eqV = t.vis ? EQUIPOS[t.vis] : null;
        const titulo = eqL && eqV ? `${eqL.flag} ${eqL.name} vs ${eqV.name} ${eqV.flag}` : `${t.etiq} <span style="color:var(--text-dim)">(eliminatoria — equipos según resultados oficiales)</span>`;
        return `<div class="card-2 p-2">
          <div class="flex items-center justify-between text-xs mb-2">
            <span class="font-bold">${titulo}</span>
            <span style="color:var(--text-dim)">${t.mid}</span>
          </div>
          <div class="flex items-center gap-2 justify-center">
            <input class="res-input input-score" type="tel" inputmode="numeric" maxlength="2" value="${r.gl!=null?r.gl:''}" data-mid="${t.mid}" data-side="l">
            <span>-</span>
            <input class="res-input input-score" type="tel" inputmode="numeric" maxlength="2" value="${r.gv!=null?r.gv:''}" data-mid="${t.mid}" data-side="v">
            <button class="btn-clear-res text-xs ml-2" data-mid="${t.mid}" style="color:var(--text-dim); padding:4px 8px">borrar</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
  $$('.res-input').forEach(inp => {
    inp.addEventListener('change', async e => {
      const mid = e.target.dataset.mid; const side = e.target.dataset.side;
      const card = e.target.closest('.card-2');
      const inL = card.querySelector('[data-side="l"]'); const inV = card.querySelector('[data-side="v"]');
      const gl = parseInt(inL.value); const gv = parseInt(inV.value);
      if (isNaN(gl) || isNaN(gv)) return;
      State.resultados[mid] = { gl, gv };
      LS.saveResults(State.resultados);
      if (SUPA_ON) {
        const { error } = await supa.from('resultados').upsert({
          match_id: mid, gol_local: gl, gol_visitante: gv, updated_at: new Date().toISOString()
        });
        if (error) toast('Error','err'); else toast('Resultado registrado','ok');
      } else toast('Guardado local','ok');
    });
  });
  $$('.btn-clear-res').forEach(b => b.addEventListener('click', async () => {
    const mid = b.dataset.mid;
    delete State.resultados[mid];
    LS.saveResults(State.resultados);
    if (SUPA_ON) await supa.from('resultados').delete().eq('match_id', mid);
    toast('Resultado borrado','warn');
    renderAdmResultados();
  }));
}

// ═══════════════════════════════════════════════════════════════
// RENDER ADMIN: PREMIOS OFICIALES
// ═══════════════════════════════════════════════════════════════
function renderAdmPremios() {
  const body = $('#adm-body');
  const res = State.resultadosPremios;
  function bloqueAdm(label, campo, candidatos) {
    return `
      <div class="card-2 p-3 mb-3">
        <div class="font-bold text-sm mb-2">${label}</div>
        <select class="adm-premio-select w-full bg-transparent border rounded-lg px-3 py-2 text-sm focus:outline-none"
                style="border-color:var(--border); color:var(--text)" data-campo="${campo}">
          <option value="">— Sin definir todavía —</option>
          ${candidatos.map(c => `<option value="${c.n}" ${res[campo]===c.n?'selected':''} style="background:var(--bg-card)">${c.f} ${c.n} (${c.p})</option>`).join('')}
        </select>
      </div>`;
  }
  body.innerHTML = `
    <p class="text-xs mb-3" style="color:var(--text-dim)">
      Cuando termine el Mundial, mete aquí los ganadores oficiales de cada premio. Se aplica el cálculo de puntos al instante.
    </p>
    ${bloqueAdm('⚽ Pichichi (máximo goleador)', 'pichichi', CANDIDATOS_PICHICHI)}
    ${bloqueAdm('🌟 Balón de Oro (mejor jugador)', 'balon_oro', CANDIDATOS_BALON_ORO)}
    ${bloqueAdm('🧤 Guante de Oro (mejor portero)', 'guante_oro', CANDIDATOS_GUANTE_ORO)}
  `;
  $$('.adm-premio-select').forEach(sel => {
    sel.addEventListener('change', async e => {
      const campo = e.target.dataset.campo;
      const valor = e.target.value || null;
      try {
        await guardarResultadoPremio(campo, valor);
        toast('Premio actualizado','ok');
      } catch(err) { toast('Error al guardar','err'); }
    });
  });
}
// ═══════════════════════════════════════════════════════════════
// ANIMACIÓN FIN DE PREDICCIONES (104/104)
// ═══════════════════════════════════════════════════════════════
function mostrarFinAnimacion(force = false) {
  if (!State.user) return;
  const key = 'porra_fin_visto_' + State.user.id;
  if (!force && localStorage.getItem(key)) return; // solo se muestra una vez

  const overlay = el(`
    <div class="overlay-fin" id="overlay-fin">
      <video autoplay loop muted playsinline src="./merino.mp4"></video>
      <h1>¡LA SUERTE ESTÁ ECHADA!</h1>
      <div class="sub">104/104 predicciones · Suerte, ${State.user.nombre} ⚽</div>
      <button id="btn-cerrar-fin" class="btn btn-primary">Cerrar</button>
    </div>
  `);
  // Confeti random
  const emojis = ['🎉','🎊','🏆','⚽','✨','🥇','🎯'];
  for (let i = 0; i < 22; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.animationDelay = (Math.random() * 2) + 's';
    c.style.animationDuration = (2.5 + Math.random()*2) + 's';
    overlay.appendChild(c);
  }
  document.body.appendChild(overlay);
  $('#btn-cerrar-fin').addEventListener('click', () => overlay.remove());
  localStorage.setItem(key, '1');
}
// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function initApp() {
  await cargarCuotas();
  await cargarResultados();
  await cargarResultadosPremios();
  if (State.user) {
    await cargarPredicciones(State.user.id);
    await cargarMisPremios(State.user.id);
  }
if (State.user && Object.keys(State.predicciones).length === 104) {
    setTimeout(() => mostrarFinAnimacion(), 1000);
  }
  renderShell();
}

(async function bootstrap() {
  const u = LS.loadUser();
  if (u) {
    State.user = u;
    State.isAdmin = LS.loadAdmin();
    try { await initApp(); }
    catch(e) { console.error(e); renderLogin(); }
  } else {
    renderLogin();
  }
})();
</script>
