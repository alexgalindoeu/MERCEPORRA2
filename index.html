    --grass-dim: #00cc6e;
    --gold: #ffc857;
    --gold-dim: #d4a437;
    --text: #e8f0ec;
    --text-dim: #8a9a93;
    --border: #243029;
    --danger: #ff5470;
    --warn: #ffb547;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg-deep); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  body { background-image: radial-gradient(ellipse at top, rgba(0,255,136,0.04) 0%, transparent 50%), radial-gradient(ellipse at bottom, rgba(255,200,87,0.03) 0%, transparent 50%); min-height: 100vh; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; }
  .card-2 { background: var(--bg-card-2); border: 1px solid var(--border); border-radius: 12px; }
  .pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; display: inline-flex; align-items: center; gap: 4px; }
  .pill-x1   { background: rgba(138,154,147,0.18); color: #b8c5be; }
  .pill-x12  { background: rgba(0,255,136,0.12);   color: var(--grass); }
  .pill-x14  { background: rgba(255,200,87,0.15);  color: var(--gold); }
  .pill-x16  { background: rgba(255,84,112,0.18);  color: var(--danger); }
  .input-score { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 10px; width: 48px; height: 48px; text-align: center; font-size: 22px; font-weight: 700; color: var(--text); transition: all .15s; }
  .input-score:focus { outline: none; border-color: var(--grass); box-shadow: 0 0 0 3px rgba(0,255,136,0.15); }
  .input-score.filled { border-color: var(--grass-dim); }
  .btn { padding: 12px 18px; border-radius: 12px; font-weight: 700; transition: all .15s; font-size: 14px; }
  .btn-primary { background: var(--grass); color: #001a0e; }
  .btn-primary:hover:not(:disabled) { background: var(--grass-dim); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-gold { background: var(--gold); color: #2a1d00; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--bg-card-2); }
  .tab-btn { flex: 1; padding: 14px 8px; font-weight: 600; font-size: 13px; color: var(--text-dim); position: relative; transition: all .2s; }
  .tab-btn.active { color: var(--grass); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: var(--grass); border-radius: 3px 3px 0 0; }
  .float-save { position: fixed; bottom: 80px; right: 18px; z-index: 50; box-shadow: 0 8px 24px rgba(0,255,136,0.3); }
  .save-ok { animation: pulseOk 0.6s ease; }
  @keyframes pulseOk { 0%{transform:scale(1)} 50%{transform:scale(1.08); box-shadow: 0 0 0 12px rgba(0,255,136,0)} 100%{transform:scale(1)} }
  .skel { background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-card-2) 50%, var(--bg-card) 100%); background-size: 200% 100%; animation: skel 1.2s infinite; }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); margin: 0 6px; transition: all .15s; }
  .pin-dot.filled { background: var(--grass); border-color: var(--grass); }
  .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
  .scroll-x { overflow-x: auto; scrollbar-width: none; }
  .scroll-x::-webkit-scrollbar { display: none; }
  .badge-master { background: linear-gradient(135deg, var(--gold), #ff8c42); color: #2a1d00; }
  .glow-grass { box-shadow: 0 0 20px rgba(0,255,136,0.15); }
  details summary { list-style: none; cursor: pointer; }
  details summary::-webkit-details-marker { display: none; }
  .flag { font-size: 22px; line-height: 1; }
  @media (max-width: 380px) { .input-score { width: 42px; height: 42px; font-size: 19px; } }

.overlay-fin {
  position: fixed; inset: 0; z-index: 9999;

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.overlay-fin video {

}
.overlay-fin h1 {
  font-size: 32px; font-weight: 900;

.overlay-fin .sub { color: #e8f0ec; font-size: 14px; margin-bottom: 24px; text-align: center; }
.confetti {
  position: absolute; font-size: 24px; pointer-events: none;
  animation: fall linear infinite;
}
@keyframes fall {
  0%{transform:translateY(-20px) rotate(0deg); opacity:1}
  100%{transform:translateY(110vh) rotate(720deg); opacity:0.6}
}

async function hashPin(pin) {
  const buf = new TextEncoder().encode(pin + ':porra2026');
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function tendencia(gl, gv) { return gl > gv ? '1' : gl < gv ? '2' : 'X'; }

const CIERRE_GLOBAL = new Date(Date.UTC(2026, 5, 11, 18, 59, 0));

function prediccionesAbiertas() { return Date.now() < CIERRE_GLOBAL.getTime(); }

function tiempoHastaCierreGlobal() {
  const diff = CIERRE_GLOBAL.getTime() - Date.now();
  if (diff <= 0) return null;
  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
  if (dias > 0) return `${dias}d ${horas}h ${mins}m`;
  if (horas > 0) return `${horas}h ${mins}m`;
  return `${mins}m`;
}
function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return Array.from(root.querySelectorAll(sel)); }
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; }

function toast(msg, type='ok') {
  const colors = { ok:'#00ff88', err:'#ff5470', warn:'#ffb547' };
  const t = el(`<div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${colors[type]};color:#001a0e;padding:10px 18px;border-radius:10px;font-weight:700;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3)">${msg}</div>`);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

async function login(nombre, pin) {
  nombre = nombre.trim();
  if (!nombre || pin.length !== 4) throw new Error('Datos inválidos');
  const ph = await hashPin(pin);
  if (!SUPA_ON) { return { id: 'local_' + nombre.toLowerCase(), nombre }; }

  let { data: matches } = await supa.from('usuarios').select('*').ilike('nombre', nombre);
  const existing = matches && matches.length ? matches[0] : null;
  if (existing) {
    if (existing.pin_hash !== ph) throw new Error('PIN incorrecto');
    return { id: existing.id, nombre: existing.nombre };
  }
  const { data: created, error } = await supa.from('usuarios').insert({ nombre, pin_hash: ph }).select().single();
  if (error) {
    if (error.code === '23505') throw new Error('Ese nombre ya está en uso');
    throw new Error('No se pudo crear: ' + error.message);
  }
  return { id: created.id, nombre: created.nombre };
}

      tend: p.tendencia, fase: faseCorregida
    };
  });
}

    LS.savePred(State.user.id, State.predicciones);
    return { ok: Object.keys(State.predicciones).length, err: 0 };
  }
  const rows = Object.entries(State.predicciones).map(([mid, p]) => ({
    user_id: State.user.id, match_id: mid, gol_local: p.gl, gol_visitante: p.gv, tendencia: p.tend,
    cuota_apostada: p.cuota, multiplicador: p.mult, fase: p.fase, updated_at: new Date().toISOString()
  }));
  if (!rows.length) return { ok:0, err:0 };
  const { error } = await supa.from('predicciones').upsert(rows, { onConflict: 'user_id,match_id' });
  if (error) return { ok: 0, err: rows.length };
  return { ok: rows.length, err: 0 };
}

// ═══════════════════════════════════════════════════════════════
// MOTOR DE SIMULACIÓN: STANDINGS Y BRACKET
// ═══════════════════════════════════════════════════════════════
function calcularStandings(predOrRes) {
  const tabla = {};
  Object.keys(GRUPOS).forEach(g => {
    tabla[g] = GRUPOS[g].map(eq => ({ eq, pts:0, gf:0, gc:0, dg:0, j:0, v:0, e:0, d:0 }));
  });
  PARTIDOS_GRUPOS.forEach(([mid, grupo, loc, vis]) => {
    const r = predOrRes[mid]; if (!r) return;
    const fila_l = tabla[grupo].find(x => x.eq === loc);
    const fila_v = tabla[grupo].find(x => x.eq === vis);
    fila_l.j++; fila_v.j++;
    fila_l.gf += r.gl; fila_l.gc += r.gv;
    fila_v.gf += r.gv; fila_v.gc += r.gl;
    if (r.gl > r.gv)      { fila_l.pts += 3; fila_l.v++; fila_v.d++; }
    else if (r.gl < r.gv) { fila_v.pts += 3; fila_v.v++; fila_l.d++; }
    else                  { fila_l.pts++; fila_v.pts++; fila_l.e++; fila_v.e++; }
  });
  Object.keys(tabla).forEach(g => {
    tabla[g].forEach(x => x.dg = x.gf - x.gc);
    tabla[g].sort((a,b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf || a.eq.localeCompare(b.eq));
  });
  return tabla;
}

function getEquipoFromSlot(slot, standings, tercerosAsignados) {
  if (slot.startsWith('T_')) return tercerosAsignados[slot] || null;
  const grupo = slot[0]; const pos = parseInt(slot[1]) - 1;
  if (!standings[grupo] || !standings[grupo][pos]) return null;
  return standings[grupo][pos].eq;
}

function asignarTerceros(standings) {
  const terceros = Object.keys(GRUPOS).map(g => ({ grupo: g, fila: standings[g][2] })).filter(x => x.fila && x.fila.j === 3);
  if (terceros.length < 12) return null;
  terceros.sort((a,b) => b.fila.pts - a.fila.pts || b.fila.dg - a.fila.dg || b.fila.gf - a.fila.gf);
  const top8 = terceros.slice(0, 8);
  const slots = [
    { id: 'T_ABCDF', acepta: ['A','B','C','D','F'] }, { id: 'T_CDFGH', acepta: ['C','D','F','G','H'] },
    { id: 'T_CEFHI', acepta: ['C','E','F','H','I'] }, { id: 'T_EHIJK', acepta: ['E','H','I','J','K'] },
    { id: 'T_AEHIJ', acepta: ['A','E','H','I','J'] }, { id: 'T_BEFIJ', acepta: ['B','E','F','I','J'] },
    { id: 'T_EFGIJ', acepta: ['E','F','G','I','J'] }, { id: 'T_DEIJL', acepta: ['D','E','I','J','L'] },
  ];
  const asignacion = {}; const usados = new Set();
  function asignar(idx) {
    if (idx === slots.length) return true;
    const slot = slots[idx];
    const candidatos = top8.filter(t => !usados.has(t.grupo) && slot.acepta.includes(t.grupo));
    for (const c of candidatos) {
      asignacion[slot.id] = c.fila.eq; usados.add(c.grupo);
      if (asignar(idx+1)) return true;
      delete asignacion[slot.id]; usados.delete(c.grupo);
    }
    return false;
  }
  if (!asignar(0)) return null;
  return asignacion;
}

function buildBracket(predicciones) {
  const stand = calcularStandings(predicciones);
  const tercerosAsig = asignarTerceros(stand);
  const result = { grupos: stand, tercerosAsig, r32: [], r16: [], qf: [], sf: [], tercer: null, final: null };

  R32_SLOTS.forEach(([mid, sL, sV]) => {
    const local = getEquipoFromSlot(sL, stand, tercerosAsig || {});
    const vis = getEquipoFromSlot(sV, stand, tercerosAsig || {});
    const pred = predicciones[mid]; let ganador = null;
    if (local && vis && pred) {
      ganador = pred.gl > pred.gv ? local : pred.gl < pred.gv ? vis : null;
      if (!ganador) ganador = local;
    }
    result.r32.push({ mid, local, vis, pred, ganador });
  });

  R16_SLOTS.forEach(([mid, i1, i2]) => {
    const local = result.r32[i1-1]?.ganador; const vis = result.r32[i2-1]?.ganador;
    const pred = predicciones[mid]; let ganador = null;
    if (local && vis && pred) ganador = pred.gl >= pred.gv ? local : vis;
    result.r16.push({ mid, local, vis, pred, ganador });
  });

  QF_SLOTS.forEach(([mid, i1, i2]) => {
    const local = result.r16[i1-1]?.ganador; const vis = result.r16[i2-1]?.ganador;
    const pred = predicciones[mid]; let ganador = null;
    if (local && vis && pred) ganador = pred.gl >= pred.gv ? local : vis;
    result.qf.push({ mid, local, vis, pred, ganador });
  });

  SF_SLOTS.forEach(([mid, i1, i2]) => {
    const local = result.qf[i1-1]?.ganador; const vis = result.qf[i2-1]?.ganador;
    const pred = predicciones[mid]; let ganador = null, perdedor = null;
    if (local && vis && pred) {
      ganador = pred.gl >= pred.gv ? local : vis; perdedor = ganador === local ? vis : local;
    }
    result.sf.push({ mid, local, vis, pred, ganador, perdedor });
  });

  const f3 = predicciones['TERCER']; const fF = predicciones['FINAL'];
  result.tercer = { mid: 'TERCER', local: result.sf[0]?.perdedor, vis: result.sf[1]?.perdedor, pred: f3 };
  result.final = { mid: 'FINAL', local: result.sf[0]?.ganador, vis: result.sf[1]?.ganador, pred: fF };
  return result;
}

// ═══════════════════════════════════════════════════════════════
// MOTOR DE PUNTUACIÓN
// ═══════════════════════════════════════════════════════════════
const PTS_SUPERVIVENCIA = { r32: 0, r16: 2, qf: 3, sf: 5, final: 8, campeon: 12 };
const PTS_CRUCE_TENDENCIA = 2; const PTS_CRUCE_EXACTO = 3;
const ORDEN_RONDAS = ['r32','r16','qf','sf','final','campeon'];

function rondaMaxAlcanzada(b, eq) {
  if (!b.r32.some(p => p.local === eq || p.vis === eq)) return null;
  if (!b.r16.some(p => p.local === eq || p.vis === eq)) return 'r32';
  if (!b.qf.some(p => p.local === eq || p.vis === eq)) return 'r16';
  if (!b.sf.some(p => p.local === eq || p.vis === eq)) return 'qf';
  const enFinal = b.final && (b.final.local === eq || b.final.vis === eq);
  const enTercer = b.tercer && (b.tercer.local === eq || b.tercer.vis === eq);
  if (!enFinal && !enTercer) return 'sf';
  if (enFinal && b.final.pred) {
    const ganador = b.final.pred.gl >= b.final.pred.gv ? b.final.local : b.final.vis;
    return ganador === eq ? 'campeon' : 'final';
  }
  return enFinal ? 'final' : 'sf';
}

function buscarPartidoEnBracket(b, mid) {
  return b.r32.find(x=>x.mid===mid) || b.r16.find(x=>x.mid===mid) || b.qf.find(x=>x.mid===mid) || b.sf.find(x=>x.mid===mid) || (mid==='TERCER' ? b.tercer : mid==='FINAL' ? b.final : null);
}

function puntuarUsuario(predicciones, premiosUser) {
  let total = 0, underdog = 0, aciertosT = 0, aciertosE = 0;
  let porFase = { grupos:0, ko:0 }; let supervivencia = 0, cruces = 0, premios = 0;

  const bracketUser = buildBracket(predicciones);
  const bracketOf = buildBracket(Object.fromEntries(Object.entries(State.resultados).map(([k,v]) => [k, {gl: v.gl, gv: v.gv, fase: 'auto', tend: tendencia(v.gl, v.gv)}])));

  Object.entries(predicciones).forEach(([mid, p]) => {
    if (p.fase !== 'grupos') return;
    const real = State.resultados[mid]; if (!real) return;
    const tendReal = tendencia(real.gl, real.gv); let puntos = 0;
    if (p.tend === tendReal) {
      aciertosT++;
      if (p.mult) { puntos = PUNTOS_BASE * p.mult; if (p.mult >= UNDERDOG_THRESHOLD) underdog += puntos; }
      else { puntos = PUNTOS_BASE; }
      if (p.gl === real.gl && p.gv === real.gv) { puntos += BONUS_EXACTO; aciertosE++; }
    }
    total += puntos; porFase.grupos += puntos;
  });

  Object.keys(EQUIPOS).forEach(eq => {
    const um = rondaMaxAlcanzada(bracketUser, eq); const om = rondaMaxAlcanzada(bracketOf, eq);
    if (!um || !om) return;
    const minIdx = Math.min(ORDEN_RONDAS.indexOf(um), ORDEN_RONDAS.indexOf(om));
    for (let i = 1; i <= minIdx; i++) { supervivencia += PTS_SUPERVIVENCIA[ORDEN_RONDAS[i]]; }
  });

  Object.entries(predicciones).forEach(([mid, p]) => {
    if (p.fase === 'grupos') return;
    const real = State.resultados[mid]; if (!real) return;
    const eUser = buscarPartidoEnBracket(bracketUser, mid); const eOf = buscarPartidoEnBracket(bracketOf, mid);
    if (!eUser?.local || !eUser?.vis || !eOf?.local || !eOf?.vis) return;
    const set1 = new Set([eUser.local, eUser.vis]); const set2 = new Set([eOf.local, eOf.vis]);
    if (set1.size !== 2 || set2.size !== 2) return;
    let coinciden = true; set1.forEach(e => { if (!set2.has(e)) coinciden = false; });
    if (!coinciden) return;
    let predGL = p.gl, predGV = p.gv; if (eUser.local !== eOf.local) { predGL = p.gv; predGV = p.gl; }
    const tendReal = tendencia(real.gl, real.gv); const tendPred = tendencia(predGL, predGV);
    let pts = 0;
    if (tendPred === tendReal) {
      aciertosT++; pts = PTS_CRUCE_TENDENCIA;
      if (predGL === real.gl && predGV === real.gv) { pts += PTS_CRUCE_EXACTO; aciertosE++; }
    }
    cruces += pts;
  });

  total += supervivencia + cruces; porFase.ko = supervivencia + cruces;

  if (premiosUser && State.resultadosPremios) {
    if (premiosUser.pichichi && premiosUser.pichichi === State.resultadosPremios.pichichi)     premios += PUNTOS_PICHICHI;
    if (premiosUser.balon_oro && premiosUser.balon_oro === State.resultadosPremios.balon_oro)   premios += PUNTOS_BALON_ORO;
    if (premiosUser.guante_oro && premiosUser.guante_oro === State.resultadosPremios.guante_oro) premios += PUNTOS_GUANTE_ORO;
  }
  total += premios;

  return {
    total: Math.round(total * 10) / 10, underdog: Math.round(underdog * 10) / 10,
    aciertosT, aciertosE, porFase, supervivencia: Math.round(supervivencia*10)/10,
    cruces: Math.round(cruces*10)/10, premios: Math.round(premios*10)/10,
  };
}

function calcularLeaderboard() {
  const filas = State.allUsers.map(u => {
    const preds = State.allPredicciones[u.id] || {}; const prem = State.allPremios[u.id] || {};
    const score = puntuarUsuario(preds, prem); return { ...u, ...score };
  });
  filas.sort((a,b) => b.total - a.total || b.aciertosE - a.aciertosE);
  let masterId = null, max = 0;
  filas.forEach(f => { if (f.underdog > max) { max = f.underdog; masterId = f.id; } });
  return { filas, masterId };
}

// HISTÓRICO Y EVOLUCIÓN GRÁFICA
// ═══════════════════════════════════════════════════════════════
function calcularHistorico() {
  const ordenPartidos = [...PARTIDOS_GRUPOS.map(p => p[0]), ...R32_SLOTS.map(s => s[0]), ...R16_SLOTS.map(s => s[0]), ...QF_SLOTS.map(s => s[0]), ...SF_SLOTS.map(s => s[0]), 'TERCER', 'FINAL'];
  const conResultado = ordenPartidos.filter(mid => State.resultados[mid]);
  if (conResultado.length === 0) return null;
  const serie = []; const resultadosOriginales = State.resultados; let resultadosParciales = {};
  conResultado.forEach((mid) => {
    resultadosParciales[mid] = resultadosOriginales[mid];
    const resGuardados = State.resultados; State.resultados = resultadosParciales;
    const snapshot = {};
    State.allUsers.forEach(u => {
      const preds = State.allPredicciones[u.id] || {}; const prem = State.allPremios[u.id] || {};
      snapshot[u.id] = puntuarUsuario(preds, prem).total;
    });
    State.resultados = resGuardados; serie.push({ label: mid, snapshot });
  });
  return serie;
}

function renderGraficaEvolucion(serie) {
  if (!serie || serie.length === 0) return '';
  const W = 320, H = 200, padL = 30, padR = 10, padT = 10, padB = 30;
  const innerW = W - padL - padR; const innerH = H - padT - padB;
  let maxPts = 0; serie.forEach(s => Object.values(s.snapshot).forEach(v => { if (v > maxPts) maxPts = v; }));
  if (maxPts < 10) maxPts = 10; maxPts = Math.ceil(maxPts / 10) * 10;
  const colores = ['#00ff88','#ffc857','#ff5470','#5ec3ff','#c876ff','#ff8c42','#76ff8c','#ffb547','#ff76d4','#76d4ff','#d4ff76','#ff7676'];
  const usuarios = State.allUsers.map((u, i) => ({ ...u, color: colores[i % colores.length] }));
  const x = (i) => padL + (serie.length === 1 ? innerW/2 : (i / (serie.length-1)) * innerW);
  const y = (v) => padT + innerH - (v / maxPts) * innerH;

  const polylines = usuarios.map(u => {
    const pts = serie.map((s, i) => `${x(i).toFixed(1)},${y(s.snapshot[u.id] || 0).toFixed(1)}`).join(' ');
    return `<polyline fill="none" stroke="${u.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>`;
  }).join('');

  const guias = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const v = Math.round(maxPts * f);
    return `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="#243029" stroke-width="0.5"/>
            <text x="${padL-4}" y="${y(v)+3}" fill="#8a9a93" font-size="9" text-anchor="end">${v}</text>`;
  }).join('');

  const xLabels = `<text x="${padL}" y="${H-10}" fill="#8a9a93" font-size="9">${serie[0].label}</text>
                   <text x="${W-padR}" y="${H-10}" fill="#8a9a93" font-size="9" text-anchor="end">${serie[serie.length-1].label}</text>`;

  const leyenda = usuarios.map(u => {
    const puntos = serie[serie.length-1].snapshot[u.id] || 0;
    return `<div class="flex items-center gap-2 text-xs"><span style="width:10px;height:10px;border-radius:50%;background:${u.color};display:inline-block"></span><span class="truncate">${u.nombre}</span><span class="ml-auto font-bold" style="color:var(--text-dim)">${puntos.toFixed(0)}</span></div>`;
  }).join('');

  return `<div class="card p-4 mt-4">
      <h3 class="font-bold text-sm mb-3">📈 Evolución del ranking</h3>
      <svg viewBox="0 0 ${W} ${H}" class="w-full" style="background:var(--bg-card-2); border-radius:8px">${guias}${polylines}${xLabels}</svg>
      <div class="mt-3 grid grid-cols-2 gap-x-4 gap-y-1">${leyenda}</div>
    </div>`;
}

    <div id="partidos-container"></div>
    <button id="btn-save" class="float-save btn btn-primary flex items-center gap-2 shadow-2xl">☁ Guardar nube</button>`;
  $$('.fase-tab').forEach(b => b.addEventListener('click', () => { State.faseTab = b.dataset.fase; renderPredicciones(); }));
  $('#btn-save').addEventListener('click', async () => {
    const btn = $('#btn-save'); btn.disabled = true; btn.innerHTML = 'Guardando...';
    const res = await guardarTodasPendientes();
    if (res.err === 0) { btn.classList.add('save-ok'); btn.innerHTML = '✓ Guardado'; toast(`${res.ok} predicciones subidas`, 'ok'); }
    else { btn.innerHTML = '⚠ Error'; toast('Error al subir', 'err'); }
    setTimeout(()=>{ btn.disabled = false; btn.innerHTML = '☁ Guardar nube'; btn.classList.remove('save-ok'); }, 1800);
  });
  if (State.faseTab === 'grupos') renderPartidosGrupos(); else renderPartidosKO(State.faseTab);
}

function renderPartidosGrupos() {
  const cont = $('#partidos-container');
  cont.innerHTML = [1,2,3].map(j => {
    return `<section class="mb-6"><h2 class="text-xs font-bold uppercase tracking-wider mb-3 px-1" style="color:var(--text-dim)">Jornada ${j}</h2><div class="space-y-2">${PARTIDOS_GRUPOS.filter(p => p[5] === j).map(p => cardPartidoGrupo(p)).join('')}</div></section>`;
  }).join('');
  enlazarInputsPartido();
}

function cardPartidoGrupo(p) {
  const [mid, grupo, loc, vis, fecha] = p;
  const eqL = EQUIPOS[loc], eqV = EQUIPOS[vis]; const cuotas = State.cuotas[mid] || [2,3,3]; const pred = State.predicciones[mid] || {};
  const tend = (pred.gl != null && pred.gv != null) ? tendencia(pred.gl, pred.gv) : null;
  const mult = tend ? multiplicadorPorCuota(tend==='1'?cuotas[0]:tend==='X'?cuotas[1]:cuotas[2]) : null;
  return `<div class="card p-3" data-mid="${mid}">
      <div class="flex items-center justify-between text-[10px] mb-2" style="color:var(--text-dim)"><span>Grupo ${grupo} · ${fecha}</span><span class="flex items-center gap-2">${mult ? `<span class="pill ${pillClassMult(mult)}">×${mult.toFixed(1)}</span>` : ''}</span></div>
      <div class="flex items-center gap-2">
        <div class="flex-1 flex items-center gap-2 min-w-0"><span class="flag">${eqL.flag}</span><div class="truncate font-bold text-sm">${eqL.name}</div></div>
        <input class="input-score score-l ${pred.gl!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gl!=null?pred.gl:''}" data-mid="${mid}" data-side="l">
        <span style="color:var(--text-dim)">-</span>
        <input class="input-score score-v ${pred.gv!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gv!=null?pred.gv:''}" data-mid="${mid}" data-side="v">
        <div class="flex-1 flex items-center gap-2 min-w-0 justify-end text-right"><div class="truncate font-bold text-sm">${eqV.name}</div><span class="flag">${eqV.flag}</span></div>
      </div>
    </div>`;
}

function renderPartidosKO(fase) {
  const cont = $('#partidos-container');
  const requisitos = { r32:{ tipo:'grupos', total: PARTIDOS_GRUPOS.length, label:'fase de grupos' }, r16:{ tipo:'r32', total: R32_SLOTS.length, label:'32avos' }, qf:{ tipo:'r16', total: R16_SLOTS.length, label:'octavos' }, sf:{ tipo:'qf', total: QF_SLOTS.length, label:'cuartos' }, final:{ tipo:'sf', total: SF_SLOTS.length, label:'semifinales' } };
  const req = requisitos[fase]; let predichosFasePrev = req?.tipo === 'grupos' ? PARTIDOS_GRUPOS.filter(p => State.predicciones[p[0]]).length : { r32: R32_SLOTS, r16: R16_SLOTS, qf: QF_SLOTS, sf: SF_SLOTS }[req?.tipo || '']?.filter(s => State.predicciones[s[0]]).length || 0;

  if (req && predichosFasePrev < req.total) {
    cont.innerHTML = `<div class="card p-8 text-center"><div class="text-5xl mb-3">🔒</div><div class="font-bold text-base mb-2">Bloqueado</div><div class="text-sm" style="color:var(--text-dim)">Termina ${req.label} primero (${predichosFasePrev}/${req.total}).</div></div>`;
    return;
  }
  const bracket = buildBracket(State.predicciones);
  const sec = { r32: { t:'32avos', i: bracket.r32 }, r16: { t:'Octavos', i: bracket.r16 }, qf: { t:'Cuartos', i: bracket.qf }, sf: { t:'Semifinales', i: bracket.sf }, final: { t:'Finales', i: [bracket.tercer, bracket.final].filter(x=>x) } }[fase];
  cont.innerHTML = `<h2 class="text-xs font-bold uppercase tracking-wider mb-3 px-1" style="color:var(--text-dim)">${sec.t}</h2><div class="space-y-2">${sec.i.map(it => cardPartidoKO(it, fase)).join('')}</div>`;
  enlazarInputsPartido();
}

function cardPartidoKO(it, fase) {
  if (!it) return ''; const pred = State.predicciones[it.mid] || {};
  const eqL = it.local ? EQUIPOS[it.local] : null; const eqV = it.vis ? EQUIPOS[it.vis] : null;
  return `<div class="card p-3" data-mid="${it.mid}">
      <div class="flex items-center justify-between text-[10px] mb-2" style="color:var(--text-dim)"><span class="font-bold">${it.mid}</span></div>
      <div class="flex items-center gap-2">
        <div class="flex-1 flex items-center gap-2 min-w-0"><span class="flag">${eqL?eqL.flag:'⬜'}</span><div class="truncate font-bold text-sm">${eqL?eqL.name:'—'}</div></div>
        <input class="input-score score-l ${pred.gl!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gl!=null?pred.gl:''}" data-mid="${it.mid}" data-side="l" ${!eqL||!eqV?'disabled':''}>
        <span style="color:var(--text-dim)">-</span>
        <input class="input-score score-v ${pred.gv!=null?'filled':''}" type="tel" inputmode="numeric" maxlength="2" value="${pred.gv!=null?pred.gv:''}" data-mid="${it.mid}" data-side="v" ${!eqL||!eqV?'disabled':''}>
        <div class="flex-1 flex items-center gap-2 min-w-0 justify-end text-right"><div class="truncate font-bold text-sm">${eqV?eqV.name:'—'}</div><span class="flag">${eqV?eqV.flag:'⬜'}</span></div>
      </div>
    </div>`;
}

function enlazarInputsPartido() {
  $$('.input-score').forEach(inp => {
    inp.addEventListener('input', async e => {
      const mid = e.target.dataset.mid; const side = e.target.dataset.side;
      if (!prediccionesAbiertas()) { e.target.value = ''; toast('🔒 Predicciones cerradas', 'err'); return; }
      const val = e.target.value.replace(/\D/g,''); e.target.value = val; if (val === '') return;
      const num = parseInt(val);

      const partidoGrupo = PARTIDOS_GRUPOS.find(p => p[0] === mid);
      const fase = partidoGrupo ? 'grupos' : (mid.startsWith('R32')?'r32':mid.startsWith('R16')?'r16':mid.startsWith('QF')?'qf':mid.startsWith('SF')?'sf':mid==='TERCER'?'tercer':'final');
      const actual = State.predicciones[mid] || {}; if (side === 'l') actual.gl = num; else actual.gv = num;

      if (actual.gl != null && actual.gv != null) {
        await guardarPrediccion(mid, actual.gl, actual.gv, fase, State.cuotas[mid]);
        if (Object.keys(State.predicciones).length === 104) setTimeout(() => mostrarFinAnimacion(), 400);
        e.target.classList.add('filled');
        if (fase === 'grupos') {
          const card = e.target.closest('[data-mid]'); const p = PARTIDOS_GRUPOS.find(x => x[0] === mid);
          if (card && p) { card.outerHTML = cardPartidoGrupo(p); enlazarInputsPartido(); }
        }
      } else { State.predicciones[mid] = actual; LS.savePred(State.user.id, State.predicciones); }
    });
  });
}

function renderPremios() {
  const main = $('#main'); const res = State.resultadosPremios; const mis = State.premios;
  function bloque(tituloIcono, titulo, descripcion, campo, candidatos, puntos) {
    const valor = mis[campo] || ''; const oficial = res[campo];
    return `<div class="card p-4 mb-3">
        <div class="flex items-start justify-between mb-3"><div><h3 class="font-bold text-base">${tituloIcono} ${titulo}</h3><p class="text-xs mt-1" style="color:var(--text-dim)">${descripcion}</p></div><span class="pill pill-x14">+${puntos} pts</span></div>
        ${oficial ? `<div class="card-2 p-2 mb-3 text-xs"><div style="color:var(--text-dim)">Ganador oficial:</div><div class="font-bold" style="color:var(--gold)">${oficial}</div></div>` : ''}
        <select class="premio-select w-full bg-transparent border rounded-lg px-3 py-3 text-sm focus:outline-none" style="border-color:var(--border); color:var(--text)" data-campo="${campo}" ${(oficial || !prediccionesAbiertas())?'disabled':''}>
          <option value="">— Elige tu apuesta —</option>
          ${candidatos.map(c => `<option value="${c.n}" ${valor===c.n?'selected':''} style="background:var(--bg-card)">${c.f} ${c.n} (${c.p}) · @${c.o.toFixed(2)}</option>`).join('')}
        </select>
      </div>`;
  }
  main.innerHTML = `<div class="card p-4 mb-4" style="background:linear-gradient(135deg, rgba(255,200,87,0.08), rgba(0,255,136,0.04)); border-color:rgba(255,200,87,0.3)"><h2 class="font-black text-lg mb-1" style="color:var(--gold)">🏅 Premios Individuales</h2></div>
    ${bloque('⚽', 'Pichichi', 'Máximo goleador', 'pichichi', CANDIDATOS_PICHICHI, PUNTOS_PICHICHI)}
    ${bloque('🌟', 'Balón de Oro', 'Mejor jugador', 'balon_oro', CANDIDATOS_BALON_ORO, PUNTOS_BALON_ORO)}
    ${bloque('🧤', 'Guante de Oro', 'Mejor portero', 'guante_oro', CANDIDATOS_GUANTE_ORO, PUNTOS_GUANTE_ORO)}
    <button id="btn-save-premios" class="float-save btn btn-primary flex items-center gap-2 shadow-2xl">☁ Guardar</button>`;

  $$('.premio-select').forEach(sel => { sel.addEventListener('change', e => { if (!prediccionesAbiertas()) return; State.premios[e.target.dataset.campo] = e.target.value || null; }); });
  $('#btn-save-premios').addEventListener('click', async () => {
    const btn = $('#btn-save-premios'); btn.disabled = true; btn.innerHTML = 'Guardando...';
    try { await guardarMisPremios(); btn.classList.add('save-ok'); btn.innerHTML = '✓ Guardado'; toast('Premios guardados', 'ok'); }
    catch(e) { btn.innerHTML = '⚠ Error'; }
    setTimeout(()=>{ btn.disabled = false; btn.innerHTML = '☁ Guardar'; btn.classList.remove('save-ok'); }, 1800);
  });
}

async function renderLeaderboard() {
  const main = $('#main'); main.innerHTML = `<div class="card p-6 text-center skel" style="height:200px"></div>`;
  
  // CONGELAMOS AQUÍ: Descarga limpia de la base de datos antes de calcular las puntuaciones
  await Promise.all([ cargarTodasPredicciones(), cargarTodosPremios(), cargarResultados(), cargarResultadosPremios() ]);
  
  const { filas, masterId } = calcularLeaderboard(); const hayResultados = Object.keys(State.resultados).length > 0;
  main.innerHTML = `
    <div class="card overflow-hidden">
      <div class="px-4 py-3 flex items-center justify-between" style="border-bottom:1px solid var(--border)"><div class="font-bold text-sm">Clasificación</div></div>
      ${filas.map((f, i) => {
        const isMe = f.id === State.user.id;
        return `<details class="border-t" style="border-color:var(--border)" ${isMe?'open':''}>
          <summary class="flex items-center px-4 py-3" style="${isMe?'background:rgba(0,255,136,0.04)':''}">
            <div class="w-8 text-center text-lg font-black">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
            <div class="flex-1 min-w-0 ml-2"><div class="font-bold text-sm">${f.nombre} ${f.id===masterId?'<span class="pill badge-master">👑 Underdog Master</span>':''}</div></div>
            <div class="text-right"><div class="font-black text-xl">${f.total}</div><div class="text-[10px]" style="color:var(--text-dim)">puntos</div></div>
          </summary>
          <div class="px-4 pb-3 grid grid-cols-4 gap-1 text-xs">
            <div class="card-2 p-2 text-center"><div class="font-bold">${f.porFase.grupos}</div><div style="color:var(--text-dim)">Grupos</div></div>
            <div class="card-2 p-2 text-center"><div class="font-bold">${f.supervivencia}</div><div style="color:var(--text-dim)">Superv.</div></div>
            <div class="card-2 p-2 text-center"><div class="font-bold">${f.cruces}</div><div style="color:var(--text-dim)">Cruces</div></div>
            <div class="card-2 p-2 text-center"><div class="font-bold">${f.premios}</div><div style="color:var(--text-dim)">Premios</div></div>
          </div>
        </details>`;
      }).join('')}
    </div>${renderGraficaEvolucion(calcularHistorico())}`;
}

async function renderRivales() {
  const main = $('#main');
  if (prediccionesAbiertas()) {
    main.innerHTML = `<div class="card p-8 text-center"><div class="text-5xl mb-3">🔒</div><div class="font-bold text-base mb-2">Bloqueado</div><div class="text-sm" style="color:var(--text-dim)">Se abre cuando empiece el Mundial para evitar copias.</div></div>`;
    return;
  }
  main.innerHTML = `<div class="card p-6 text-center skel" style="height:200px"></div>`;
  
  // Forzamos la descarga sincronizada para la pestaña de rivales
  await Promise.all([ cargarTodasPredicciones(), cargarResultados() ]);

  let selectedMid = State.rivalesMatchId || PARTIDOS_GRUPOS[0][0];
  let partido = PARTIDOS_GRUPOS.find(p => p[0] === selectedMid);
  const [mid, grupo, loc, vis, fecha, jornada] = partido;
  const eqL = EQUIPOS[loc], eqV = EQUIPOS[vis];
  const rivales = (State.allUsers || []).filter(u => u.id !== State.user.id).map(u => ({ user: u, pred: State.allPredicciones[u.id]?.[mid] })).filter(x => x.pred && x.pred.gl != null && x.pred.gv != null);

  main.innerHTML = `
    <div class="card p-4 mb-4"><div class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--text-dim)">Seleccionar partido</div>${renderSelectorPartidos(selectedMid)}</div>
    <div class="card p-4 mb-4 text-center font-bold text-sm">${eqL.flag} ${eqL.name} VS ${eqV.name} ${eqV.flag}</div>
    <div class="card overflow-hidden">
      ${rivales.map(r => `<div class="px-4 py-3 flex items-center justify-between border-t" style="border-color:var(--border)"><div><div class="font-bold">${r.user.nombre}</div></div><div class="font-black text-xl">${r.pred.gl} - ${r.pred.gv}</div></div>`).join('')}
    </div>`;

  $('#rival-match-select').addEventListener('change', e => { State.rivalesMatchId = e.target.value; renderRivales(); });
}

function renderResumen() {
  const bracket = buildBracket(State.predicciones); const previstos = puntuarUsuario(State.predicciones, State.premios);
  $('#main').innerHTML = `
    <div class="grid grid-cols-2 gap-2 mb-4">
      <div class="card p-3"><div class="text-[10px] uppercase font-bold">Puntos conseguidos</div><div class="text-2xl font-black">${previstos.total}</div></div>
      <div class="card p-3"><div class="text-[10px] uppercase font-bold">En underdogs</div><div class="text-2xl font-black">${previstos.underdog}</div></div>
    </div>
    <div class="card p-4">
      <h3 class="font-bold text-sm mb-3">Tu bracket final simulado</h3>
      <div class="space-y-3">
        <div class="card-2 p-2 text-center text-xs">🥉 3er Puesto: ${bracket.tercer.pred?`${bracket.tercer.pred.gl}-${bracket.tercer.pred.gv}`:'—'}</div>
        <div class="card-2 p-2 text-center text-xs font-bold" style="color:var(--gold)">🏆 FINAL: ${bracket.final.pred?`${bracket.final.pred.gl}-${bracket.final.pred.gv}`:'—'}</div>
      </div>
    </div>`;
}

function renderAdmin() {
  const modal = el(`<div class="fixed inset-0 z-50 modal-bg flex items-center justify-center p-3"><div class="card w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col"><div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--border)"><div class="font-bold">⚙ Panel Admin</div><button id="adm-close" class="btn btn-ghost text-xs">Cerrar</button></div><div id="adm-body" class="flex-1 overflow-y-auto p-4"></div></div></div>`);
  document.body.appendChild(modal); $('#adm-close').addEventListener('click', () => modal.remove());
  renderAdmResultados();
}

function renderAdmResultados() {
  $('#adm-body').innerHTML = `<p class="text-xs mb-3" style="color:var(--text-dim)">Introduce los marcadores oficiales aquí:</p>
    <div class="space-y-2">${PARTIDOS_GRUPOS.map(p => {
      const r = State.resultados[p[0]] || {};
      return `<div class="card-2 p-2 flex items-center justify-between text-xs"><span>${EQUIPOS[p[2]].name} vs ${EQUIPOS[p[3]].name}</span><div class="flex gap-1"><input class="res-input bg-transparent border text-center w-10" value="${r.gl!=null?r.gl:''}" data-mid="${p[0]}" data-side="l">-<input class="res-input bg-transparent border text-center w-10" value="${r.gv!=null?r.gv:''}" data-mid="${p[0]}" data-side="v"></div></div>`;
    }).join('')}</div>`;
  $$('.res-input').forEach(inp => {
    inp.addEventListener('change', async e => {
      const card = e.target.closest('.card-2'); const mid = e.target.dataset.mid;
      const gl = parseInt(card.querySelector('[data-side="l"]').value); const gv = parseInt(card.querySelector('[data-side="v"]').value);
      if (isNaN(gl) || isNaN(gv)) return; State.resultados[mid] = { gl, gv }; LS.saveResults(State.resultados);
      if (SUPA_ON) { await supa.from('resultados').upsert({ match_id: mid, gol_local: gl, gol_visitante: gv }); toast('Resultado guardado', 'ok'); }
    });
  });
}

function mostrarFinAnimacion() {
  const key = 'porra_fin_visto_' + State.user.id; if (localStorage.getItem(key)) return;
  const overlay = el(`<div class="overlay-fin" id="overlay-fin"><h1>¡LA SUERTE ESTÁ ECHADA!</h1><div class="sub">104/104 predicciones completadas</div><button id="btn-cerrar-fin" class="btn btn-primary">Cerrar</button></div>`);
  document.body.appendChild(overlay); $('#btn-cerrar-fin').addEventListener('click', () => overlay.remove()); localStorage.setItem(key, '1');
}

async class App {
  static async init() {
    await Promise.all([cargarCuotas(), cargarResultados(), cargarResultadosPremios()]);
    if (State.user) { await Promise.all([cargarPredicciones(State.user.id), cargarMisPremios(State.user.id)]); }
    renderShell();
  }
}

async function initApp() { await App.init(); }

(async function bootstrap() {
  const u = LS.loadUser();
  if (u) { State.user = u; State.isAdmin = LS.loadAdmin(); await initApp(); }
  else { renderLogin(); }
})();
</script>
